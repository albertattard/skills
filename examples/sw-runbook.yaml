entries:
  - type: Heading
    level: H1
    title: Applying Skills in Software Development

  - type: Markdown
    contents: |
      This walkthrough shows how to start from an early product idea and turn it
      into a project that can use agentic coding in a controlled, reviewable way.
      The goal is not to hand the whole project to an agent in one prompt. The goal
      is to create enough product, architecture, production, and task context that
      each agent run has a clear purpose, a bounded scope, and concrete validation
      expectations.

      Software engineers should read the runbook as both executable documentation
      and a development workflow. Each phase produces an artefact that a human can
      inspect before the next phase starts. That gives the team places to challenge
      assumptions, tighten ambiguous requirements, reject weak plans, and keep the
      implementation grounded in product intent.

  - type: Heading
    level: H2
    title: Workflow

  - type: Markdown
    contents: |
      The runbook follows this path:

      ```text
      product description
        -> MVP scope
        -> product requirements document (PRD)
        -> vertical slices
        -> path to production
        -> architecture decision records (ADRs)
        -> implementation task documents
        -> completed implementation tasks
      ```

      The early steps reduce ambiguity before code is generated. The middle steps
      split the product into small, user-visible increments and identify production
      constraints. The later steps turn those decisions into concrete task documents
      that an agent can complete one at a time with tests and validation.

  - type: Heading
    level: H2
    title: Skills

  - type: Markdown
    contents: |
      A **skill** in agentic coding is a reusable, task-specific capability package: a
      compact bundle of instructions, conventions, examples, and sometimes scripts
      that teaches an agent how to do one class of work reliably. Think of it as a
      focused operating manual for a narrow domain, like
      “implement backend CRUD endpoints,” “review a Java diff for security issues,” or
      “generate release notes from commit history.” The point is not to make the model
      smarter in general; it is to make it more consistent, more accurate, and less
      dependent on ad hoc prompting each time.

      For a software engineer, the useful mental model is: **prompting tells the agent
      what to do right now; a skill tells it how to do that kind of work every time**.
      Good skills reduce ambiguity, define the expected output shape, encode edge cases,
      and constrain the agent away from bad habits. In practice, they sit somewhere
      between documentation and automation: lighter than a full app, but more durable
      than a one-off prompt. In agentic systems, that matters because the agent is not
      just answering questions; it is executing workflows, and the skill becomes the
      guardrail that keeps execution repeatable.

      In this runbook, each skill owns one repeatable phase of the workflow:
      clarifying scope, deriving requirements, slicing work, planning production,
      capturing architecture decisions, deriving implementation tasks, and
      implementing one ready task. Installing a skill before using it makes the
      agent's behaviour explicit and reviewable instead of hidden in a one-off
      prompt.

  - type: Heading
    level: H2
    title: Skills and Repository Instructions

  - type: Markdown
    contents: |
      This runbook uses both skills and an `AGENTS.md` file. They are both
      agent instructions, but they serve different purposes.

      `AGENTS.md` captures repository-level policy and context: how agents should
      work in this project, how commits should be shaped, how documentation should
      stay organised, and which conventions should remain consistent across tasks.

      A skill captures a task-specific workflow: how an agent should perform one
      kind of work, such as clarifying scope, deriving vertical slices, capturing
      architecture decisions, or implementing a ready task.

      A useful rule of thumb is:

      - `AGENTS.md` answers: “How should agents work in this repository?”
      - A skill answers: “How should agents perform this kind of task?”

      The runbook creates `AGENTS.md` once because it applies to the whole project.
      It installs several skills because each later phase needs a different,
      repeatable workflow.

  - type: Heading
    level: H2
    title: Prerequisites

  - type: Markdown
    contents: |
      Follow this guide from a fresh, disposable project directory.

      Do not follow it from inside the workshop repository or from inside an
      existing application repository. The steps below create a new Git repository
      with `git init`, write project files, install local skills, generate
      planning documents, and commit each phase.

      At the start, the directory should contain only the bootstrap files provided
      by the workshop: `runbook.md`, `.fixtures/`, and
      `docs/product/description.md`. The guide turns that bootstrap directory into
      a new project.

      Some examples may need Docker later in the run. Checking it up front avoids
      discovering that Docker is not running after the workflow has already been
      executing for a long time.

  - type: Prerequisite
    checks:
      - kind: command
        name: Git
        contents: |
          - [Git](https://git-scm.com/downloads)
        commands: git --version
        help: Install Git and make sure `git` is available on your PATH.
      - kind: command
        name: Fresh project directory
        contents: |
          - A fresh project directory that is not inside an existing Git repository.
        commands: |
          ! git rev-parse --is-inside-work-tree >/dev/null 2>&1
        help: Follow this guide from a fresh disposable project directory, not from the
          workshop repository, an existing Git repository, or a subdirectory of
          one.
      - kind: command
        name: Codex CLI
        contents: |
          - [Codex CLI](https://developers.openai.com/codex/cli)
        commands: codex --version
        help: Install Codex CLI and make sure `codex` is available on your PATH.
      - kind: command
        name: Tree
        contents: |
          - [Tree](https://oldmanprogrammer.net/source.php?dir=projects/tree)
        commands: tree --version
        help: Install Tree and make sure `tree` is available on your PATH.
      - kind: command
        name: Docker
        contents: |
          - [Docker](https://docs.docker.com/get-docker/)
        commands: |
          docker info >/dev/null
        help: Install Docker and start the Docker daemon before running this example.

  - type: Heading
    level: H2
    title: Initialise Project Repository

  - type: Markdown
    contents: |
      1. Initialise the project repository.

         When working with a coding agent, you need a reliable way to distinguish
         changes made by the agent from the state that already existed before the
         task started. Version control gives you that boundary.

         The pattern is: start from a clean worktree, let the agent perform a
         bounded task, then use Git to inspect exactly what changed before deciding
         whether to keep, revise, or discard the result.

  - type: Command
    commands: |
      git init

      cat <<'EOF' > '.gitignore'
      # Ignore the IDE and Development related files
      .idea/
      .oca/
      target/

      # Ignore the OS related files
      **/.DS_Store

      # Ignore the bootstrap files as these are not part of the runbook output
      /runbook.md
      /sw-runbook.yaml
      /.fixtures
      EOF

      cat <<'EOF' > '.gitattributes'
      /mvnw text eol=lf
      *.cmd text eol=crlf
      EOF

      git add '.gitignore' '.gitattributes'
      git commit --message 'Add repository baseline files'
    indent: 3

  - type: Heading
    level: H2
    title: Establish Repository Instructions

  - type: Markdown
    contents: |
      A coding agent can only follow the context it has available. If you explain
      project conventions in one chat session, a later session may not have that
      conversation. Even when the files are the same, the agent may not know how
      you want commits shaped, documentation organised, domain language handled,
      or generated changes reviewed.

      Consider a simple example. In one session, tell the model how you want commit
      messages to be written.

  - type: Command
    debug: true
    commands: |
      codex exec - <<'EOF'
      Keep commits coherent. Each commit should contain one logical change, and unrelated repository workflow changes should be committed separately.

      When proposing commit messages, use:

      1. A short imperative subject line that starts with a verb.
      2. A body paragraph that explains why the change exists.

      Focus the body on motivation, context, or intent that cannot be determined from the diff. Avoid restating files changed or implementation details that are already visible in the commit.
      EOF
    output:
      caption: |
        The model’s output
      rewrite:
        - type: keep_between
          start_pattern: '^session id: [0-9a-fA-F-]+$'
          end: tokens used
          start_offset: 0
          end_offset: -1
          show_trim_markers: false
    capture:
      - name: session_id
        source: stderr
        stage: raw
        pattern: 'session id: ([0-9a-fA-F-]+)'
    timeout: 1 minute

  - type: Markdown
    contents: |
      In the Codex app, ask the following follow-up question in the same chat.

      If you are running the terminal commands instead, use the session id from
      the previous command, `@{session_id}`, to continue working in the same
      session. The command below resumes that exact session. Your session id may
      be different.

  - type: Command
    commands: |
      codex exec resume '@{session_id}' - <<'EOF'
      List my commit message preference, please.
      EOF
    output:
      caption: |
        The model’s output
      rewrite:
        - type: keep_between
          start_pattern: '^session id: [0-9a-fA-F-]+$'
          end: tokens used
          start_offset: 0
          end_offset: -1
          show_trim_markers: false
    timeout: 1 minute

  - type: Markdown
    contents: |
      The resumed command shows the same session id, `@{session_id}`. That confirms
      Codex is continuing the existing session and can use the messages already in
      that conversation.

      The model can use the previous prompt to answer the question in the second
      prompt because both prompts belong to the same session.

      Now ask the same question in a new session, without resuming the captured
      session. A new session should not depend on context from the previous
      conversation.

  - type: Command
    commands: |
      codex exec - <<'EOF'
      List my commit message preference, please.
      EOF
    output:
      caption: |
        The model’s output
      capture:
        - name: new_session_id
          source: stderr
          stage: raw
          pattern: 'session id: ([0-9a-fA-F-]+)'
      rewrite:
        - type: keep_between
          start_pattern: '^session id: [0-9a-fA-F-]+$'
          end: tokens used
          start_offset: 0
          end_offset: -1
          show_trim_markers: false
    timeout: 1 minute
    indent: 3

  - type: Markdown
    contents: |
      The new command starts a different session: `@{new_session_id}`. That is not
      the session where we set the commit-message rules, which was `@{session_id}`.
      Because this prompt is in a new session, Codex does not have the earlier chat
      context from `@{session_id}`.

      The model may still give a plausible answer, but that answer is not grounded
      in a durable project instruction. It is only guessing from the current prompt,
      local files, or general commit-message conventions. That can lead to
      inconsistent behaviour across sessions, which is what `AGENTS.md` helps
      mitigate.

      `AGENTS.md` is a Markdown file that stores repository-level instructions for
      agent tools. There is nothing special about the Markdown syntax itself. What
      matters is the file name. Tools such as Codex know to read `AGENTS.md` and
      include its instructions when working in the repository.

      A simplified prompt sent by an agent tool may look like this:

      ```json
      [
        {
          "role": "system",
          "content": "..."
        },
        {
          "role": "user",
          "content": "[agents.md]\n..."
        },
        {
          "role": "user",
          "content": "Prompt 1 ..."
        },
        {
          "role": "assistant",
          "content": "Reply to prompt 1 ..."
        },
        {
          "role": "user",
          "content": "Prompt 2 ..."
        }
      ]
      ```

      The system message is controlled by the agent tool, so project-specific
      guidance belongs in repository files such as `AGENTS.md`.

      `AGENTS.md` makes those expectations part of the repository. Future agent
      runs can read the file and recover the working rules without relying on
      memory from a previous chat.

  - type: Markdown
    contents: |
      1. Create the `AGENTS.md` file and define how to commit changes and how the
         directory will be initially organised.

  - type: Command
    commands: |
      cat <<'EOF' > 'AGENTS.md'
      # Repository Instructions

      ## Commit Messages

      Keep commits coherent. Each commit should contain one logical change, and unrelated repository workflow changes should be committed separately.

      When proposing commit messages, use:

      1. A short imperative subject line that starts with a verb.
      2. A body paragraph that explains why the change exists.

      Focus the body on motivation, context, or intent that cannot be determined from the diff. Avoid restating files changed or implementation details that are already visible in the commit.

      ## Ubiquitous Language

      Product, scope, requirements, slices, and production-readiness documents should use the project's ubiquitous language consistently.

      When introducing, changing, or discovering ambiguity in a domain-significant term, update `docs/domain/ubiquitous-language.md` or record the ambiguity as an open question in the relevant product artefact.

      Do not turn the ubiquitous language into a dump of every noun in the project. Capture terms that affect product behaviour, user experience, domain rules, data meaning, acceptance criteria, or implementation naming.

      ## Project README

      The repository root must contain a developer-facing `README.md`.

      Keep the top-level `README.md` short and practical. It should:

      - Describe what the project is and what problem it solves.
      - Explain prerequisites and the commands to build, test, and run the application locally.
      - If build, test, or run commands are not known yet, say what is missing instead of inventing commands, then replace that note once tooling exists.
      - Link to the relevant `docs/README.md` and other important project documentation instead of duplicating it.
      - Stay current when project structure, build tooling, runtime commands, or documentation locations change.

      ## Documentation Indexes

      Each documentation directory should contain a `README.md`.

      A directory `README.md` should explain the purpose of that directory and link to relevant child documentation:

      - The top-level `docs/README.md` links to subdirectory `README.md` files.
      - A subdirectory `README.md` describes that subdirectory and links to Markdown files in that subdirectory.
      - Keep indexes current when adding, moving, or deleting documentation files.
      EOF
    indent: 3

  - type: Markdown
    contents: |
      This guide creates the root `AGENTS.md` file because these instructions apply
      to the whole project.

      A repository can contain more than one `AGENTS.md` file. The root file
      usually captures rules that apply everywhere. More specific directories can
      add their own instructions when part of the project needs different
      conventions. For example, a root `AGENTS.md` might define commit and
      documentation rules, while `backend/AGENTS.md` or `frontend/AGENTS.md` could
      add stack-specific guidance for those directories.
    indent: 3

  - type: Markdown
    contents: |
      2. Commit the repository instructions.

         In an interactive workflow, you can ask the agent to review the changed
         files, propose a commit message, and create the commit.

         ```text
         commit changes
         ```

         This guide also shows the manual Git commands so you can see exactly what
         is committed at this checkpoint.
  - type: Command
    commands: |
      git add 'AGENTS.md'
      git commit \
        --message 'Add repository agent instructions' \
        --message 'Capture repository-level expectations for coherent commits, shared domain language, and practical documentation indexes.' \
        --message 'Keep product, scope, requirements, and slice artefacts easier to review as the project grows.'
    indent: 3

  - type: Heading
    level: H2
    title: Product Description

  - type: Markdown
    contents: |
      1. Review the product description (`docs/product/description.md`).

  - type: Markdown
    contents: |
      2. Ask the model to apply the project README and documentation index rules from `AGENTS.md`.

         ```text
         Create or update the top-level `README.md` and any documentation `README.md` files required by @AGENTS.md.
         ```

  - type: Command
    commands: |
      codex exec --full-auto <<'EOF'
      Create or update the top-level `README.md` and any documentation `README.md` files required by @AGENTS.md.
      EOF
    output:
      caption: |
        The model’s output
      rewrite:
        - type: limit_lines
          last: 20
    timeout: 1 minute
    indent: 3

  - type: Markdown
    contents: |
      (*Optional*) List the files under the `docs` directory
    indent: 3

  - type: Command
    commands: |
      tree --dirsfirst --sort=name 'docs'
    output:
      caption: |
        The documentation files
    indent: 3

  - type: Markdown
    contents: |
      3. Commit changes

          In an interactive run, you can ask the model to analyse the modified files,
          create a commit message, and commit them using the following prompt.

          ```text
          commit changes
          ```

          The runbook uses manual Git commands so this step remains reproducible in
          environments where Codex cannot write to Git metadata.

  - type: Command
    commands: |
      git add 'docs/'
      git commit \
        --message 'Add product description' \
        --message 'Capture the initial product direction before narrowing it into a first minimum viable product (MVP) scope document.'
    indent: 3

  - type: Heading
    level: H2
    title: Create Minimum Viable Product (MVP) Scope

  - type: Markdown
    contents: |
      1. Create a repository-scoped `create-scope` skill.

         The skill will help the model turn the product description into a clear
         scope before implementation starts.

  - type: Command
    commands: |
      mkdir -p '.codex/skills'
      cp -R '.fixtures/skills/create-scope' '.codex/skills/'
    indent: 3

  - type: Markdown
    contents: |
      (*Optional*) Show the generated skill metadata.
    indent: 3

  - type: Command
    commands: |
      tree --dirsfirst --sort=name '.codex/skills/create-scope'
    output:
      caption: |
        The generated skill
    indent: 3

  - type: Markdown
    contents: |
      2. Commit the skill.

          In an interactive run, you can ask the model to analyse the modified files,
          create a commit message, and commit them using the following prompt.

          ```text
          commit changes
          ```

          The runbook uses manual Git commands so this step remains reproducible in
          environments where Codex cannot write to Git metadata.

  - type: Command
    commands: |
      git add '.codex/skills/create-scope'
      git commit \
        --message 'Add create scope skill' \
        --message 'Teach Codex to clarify product ideas and produce focused scope documents before implementation starts.'
    indent: 3

  - type: Markdown
    contents: |
      3. Apply the `create-scope` skill to obtain the first scope document, usually
         referred to as the MVP Scope.

         ```text
         Use $create-scope to clarify @docs/product/description.md before we create requirements or scaffold the application and create the `docs/scopes/mvp-scope.md`.
         ```

         The runbook provides answers up front because it needs to run unattended. In
         an interactive session, you can use the prompt alone and answer the questions
         one by one.

  - type: Command
    commands: |
      codex exec --full-auto <<'EOF'
      Use $create-scope to clarify @docs/product/description.md before we create requirements or scaffold the application and create the `docs/scopes/mvp-scope.md`.

      Use the answers in @.fixtures/prompts/create-scope-answers.md without asking follow-up questions. If further clarification is still needed, use your best judgement and keep things simple.
      EOF
    output:
      caption: |
        The model’s output
      rewrite:
        - type: limit_lines
          last: 20
    timeout: 3 minutes
    indent: 3

  - type: Markdown
    contents: |
      4. Ask the model to apply the project README and documentation index rules from `AGENTS.md`.

  - type: Command
    commands: |
      codex exec --full-auto <<'EOF'
      Create or update the top-level `README.md` and any documentation `README.md` files required by `AGENTS.md`.
      EOF
    output:
      caption: |
        The model’s output
      rewrite:
        - type: limit_lines
          last: 20
    timeout: 1 minute
    indent: 3

  - type: Markdown
    contents: |
      (*Optional*) List the files under the `docs` directory
    indent: 3

  - type: Command
    commands: |
      tree --dirsfirst --sort=name 'docs'
    output:
      caption: |
        The documentation files
    indent: 3

  - type: Markdown
    contents: |
      5. Commit changes

          In an interactive run, you can ask the model to analyse the modified files,
          create a commit message, and commit them using the following prompt.

          ```text
          commit changes
          ```

          The runbook uses manual Git commands so this step remains reproducible in
          environments where Codex cannot write to Git metadata.

  - type: Command
    commands: |
      git add 'docs/'
      git commit \
        --message 'Add MVP scope' \
        --message 'Capture the first buildable unit so implementation can focus on proving the core implementation.'
    indent: 3

  - type: Heading
    level: H2
    title: Derive Product Requirements Document

  - type: Markdown
    contents: |
      1. Create a repository-scoped `derive-product-requirements-document` skill.

         This skill turns an agreed scope into a Product Requirements Document that is detailed enough to derive vertical slices.

  - type: Command
    commands: |
      cp -R '.fixtures/skills/derive-product-requirements-document' '.codex/skills/'
    indent: 3

  - type: Markdown
    contents: |
      (*Optional*) Show the generated skill metadata.
    indent: 3

  - type: Command
    commands: |
      tree --dirsfirst --sort=name '.codex/skills/derive-product-requirements-document'
    output:
      caption: |
        The generated skill
    indent: 3

  - type: Markdown
    contents: |
      2. Commit the skill.

          In an interactive run, you can ask the model to analyse the modified files,
          create a commit message, and commit them using the following prompt.

          ```text
          commit changes
          ```

          The runbook uses manual Git commands so this step remains reproducible in
          environments where Codex cannot write to Git metadata.

  - type: Command
    commands: |
      git add '.codex/skills/derive-product-requirements-document'
      git commit \
        --message 'Add product requirements document skill' \
        --message 'Extend the reusable product workflow with a step that turns agreed scope into explicit product requirements before deriving vertical slices.'
    indent: 3

  - type: Markdown
    contents: |
      3. Apply the `derive-product-requirements-document` skill to obtain the product
         requirements document.

  - type: Command
    commands: |
      codex exec --full-auto <<'EOF'
      Use $derive-product-requirements-document to convert @docs/scopes/mvp-scope.md into a Product Requirements Document.
      EOF
    output:
      caption: |
        The model’s output
      rewrite:
        - type: limit_lines
          last: 20
    timeout: 3 minutes
    indent: 3

  - type: Markdown
    contents: |
      4. Ask the model to apply the project README and documentation index rules from `AGENTS.md`.

  - type: Command
    commands: |
      codex exec --full-auto <<'EOF'
      Create or update the top-level `README.md` and any documentation `README.md` files required by `AGENTS.md`.
      EOF
    output:
      caption: |
        The model’s output
      rewrite:
        - type: limit_lines
          last: 20
    timeout: 1 minute
    indent: 3

  - type: Markdown
    contents: |
      (*Optional*) List the files under the `docs` directory
    indent: 3

  - type: Command
    commands: |
      tree --dirsfirst --sort=name 'docs'
    output:
      caption: |
        The documentation files
    indent: 3

  - type: Markdown
    contents: |
      5. Commit changes

          In an interactive run, you can ask the model to analyse the modified files,
          create a commit message, and commit them using the following prompt.

          ```text
          commit changes
          ```

          The runbook uses manual Git commands so this step remains reproducible in
          environments where Codex cannot write to Git metadata.

  - type: Command
    commands: |
      git add 'docs/'
      git commit \
        --message 'Add product requirements' \
        --message 'Capture the MVP requirements derived from the agreed scope so the next workflow step can split the requirements into vertical slices.'
    indent: 3

  - type: Heading
    level: H2
    title: Derive Vertical Slices

  - type: Markdown
    contents: |
      1. Create a repository-scoped `derive-vertical-slices` skill.

         This skill helps the model turn a Product Requirements Document (PRD) into
         small, ordered vertical slice documents under `docs/slices/`. Each slice must
         be independently understandable, linked back to the source PRD, focused on a
         user-visible outcome, and avoid horizontal technical task breakdowns.

  - type: Command
    commands: |
      cp -R '.fixtures/skills/derive-vertical-slices' '.codex/skills/'
    indent: 3

  - type: Markdown
    contents: |
      (*Optional*) Show the generated skill metadata.
    indent: 3

  - type: Command
    commands: |
      tree --dirsfirst --sort=name '.codex/skills/derive-vertical-slices'
    output:
      caption: |
        The generated skill
    indent: 3

  - type: Markdown
    contents: |
      2. Commit the skill.

          In an interactive run, you can ask the model to analyse the modified files,
          create a commit message, and commit them using the following prompt.

          ```text
          commit changes
          ```

          The runbook uses manual Git commands so this step remains reproducible in
          environments where Codex cannot write to Git metadata.

  - type: Command
    commands: |
      git add '.codex/skills/derive-vertical-slices'
      git commit \
        --message 'Add vertical slices skill' \
        --message 'Extend the reusable product workflow with a step that turns product requirements into ordered implementation slices.'
    indent: 3

  - type: Markdown
    contents: |
      3. Apply the `derive-vertical-slices` skill to obtain the first set of
         vertical slices.

  - type: Command
    commands: |
      codex exec --full-auto <<'EOF'
      Use $derive-vertical-slices to convert @docs/requirements/product-requirements-document.md into ordered vertical slice documents.
      EOF
    output:
      caption: |
        The model’s output
      rewrite:
        - type: limit_lines
          last: 20
    timeout: 3 minutes
    indent: 3

  - type: Markdown
    contents: |
      4. Ask the model to apply the project README and documentation index rules from `AGENTS.md`.

  - type: Command
    commands: |
      codex exec --full-auto <<'EOF'
      Create or update the top-level `README.md` and any documentation `README.md` files required by `AGENTS.md`.
      EOF
    output:
      caption: |
        The model’s output
      rewrite:
        - type: limit_lines
          last: 20
    timeout: 1 minute
    indent: 3

  - type: Markdown
    contents: |
      (*Optional*) List the files under the `docs` directory
    indent: 3

  - type: Command
    commands: |
      tree --dirsfirst --sort=name 'docs'
    output:
      caption: |
        The documentation files
    indent: 3

  - type: Markdown
    contents: |
      5. Commit changes

          In an interactive run, you can ask the model to analyse the modified files,
          create a commit message, and commit them using the following prompt.

          ```text
          commit changes
          ```

          The runbook uses manual Git commands so this step remains reproducible in
          environments where Codex cannot write to Git metadata.

  - type: Command
    commands: |
      git add 'docs/'
