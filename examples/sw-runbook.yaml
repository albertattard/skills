entries:
  - type: Heading
    level: H1
    title: Applying Skills in Software Development

  - type: Markdown
    contents: |
      This walkthrough shows how to start from an early product idea and turn it
      into a project that can use agentic coding in a controlled, reviewable way.
      The goal is not to hand the whole project to an agent in one prompt. The goal
      is to create enough product, architecture, production, and task context that
      each agent run has a clear purpose, a bounded scope, and concrete validation
      expectations.

      Software engineers should read the runbook as both executable documentation
      and a development workflow. Each phase produces an artefact that a human can
      inspect before the next phase starts. That gives the team places to challenge
      assumptions, tighten ambiguous requirements, reject weak plans, and keep the
      implementation grounded in product intent.

  - type: Heading
    level: H2
    title: Workflow

  - type: Markdown
    contents: |
      The runbook follows this path:

      ```text
      product description
        -> MVP scope
        -> product requirements document (PRD)
        -> vertical slices
        -> path to production
        -> architecture decision records (ADRs)
        -> implementation task documents
        -> completed implementation tasks
      ```

      The early steps reduce ambiguity before code is generated. The middle steps
      split the product into small, user-visible increments and identify production
      constraints. The later steps turn those decisions into concrete task documents
      that an agent can complete one at a time with tests and validation.

  - type: Heading
    level: H2
    title: Skills

  - type: Markdown
    contents: |
      A **skill** in agentic coding is a reusable, task-specific capability package: a
      compact bundle of instructions, conventions, examples, and sometimes scripts
      that teaches an agent how to do one class of work reliably. Think of it as a
      focused operating manual for a narrow domain, like
      “implement backend CRUD endpoints,” “review a Java diff for security issues,” or
      “generate release notes from commit history.” The point is not to make the model
      smarter in general; it is to make it more consistent, more accurate, and less
      dependent on ad hoc prompting each time.

      For a software engineer, the useful mental model is: **prompting tells the agent
      what to do right now; a skill tells it how to do that kind of work every time**.
      Good skills reduce ambiguity, define the expected output shape, encode edge cases,
      and constrain the agent away from bad habits. In practice, they sit somewhere
      between documentation and automation: lighter than a full app, but more durable
      than a one-off prompt. In agentic systems, that matters because the agent is not
      just answering questions; it is executing workflows, and the skill becomes the
      guardrail that keeps execution repeatable.

      In this runbook, each skill owns one repeatable phase of the workflow:
      clarifying scope, deriving requirements, slicing work, planning production,
      capturing architecture decisions, deriving implementation tasks, and
      implementing one ready task. Installing a skill before using it makes the
      agent's behaviour explicit and reviewable instead of hidden in a one-off
      prompt.

  - type: Heading
    level: H2
    title: Skills and Repository Instructions

  - type: Markdown
    contents: |
      This runbook uses both skills and an `AGENTS.md` file. They are both
      agent instructions, but they serve different purposes.

      `AGENTS.md` captures repository-level policy and context: how agents should
      work in this project, how commits should be shaped, how documentation should
      stay organised, and which conventions should remain consistent across tasks.

      A skill captures a task-specific workflow: how an agent should perform one
      kind of work, such as clarifying scope, deriving vertical slices, capturing
      architecture decisions, or implementing a ready task.

      A useful rule of thumb is:

      - `AGENTS.md` answers: “How should agents work in this repository?”
      - A skill answers: “How should agents perform this kind of task?”

      The runbook creates `AGENTS.md` once because it applies to the whole project.
      It installs several skills because each later phase needs a different,
      repeatable workflow.

  - type: Heading
    level: H2
    title: Prerequisites

  - type: Markdown
    contents: |
      Follow this runbook from a fresh, disposable project directory.

      Do not follow it from inside the workshop repository or from inside an
      existing application repository. The steps below create a new Git repository
      with `git init`, write project files, install local skills, generate
      planning documents, and commit each phase.

      At the start, the repository directory should contain only the bootstrap
      product description at `docs/product/description.md`. The runbook turns that
      bootstrap directory into a new project.

      Some examples may need Docker later in the run. Checking it up front avoids
      discovering that Docker is not running after the workflow has already been
      executing for a long time.

  - type: Prerequisite
    checks:
      - kind: command
        name: Git
        contents: |
          - [Git](https://git-scm.com/downloads)
        commands: git --version
        help: Install Git and make sure `git` is available on your PATH.
      - kind: command
        name: Fresh project directory
        contents: |
          - A fresh project directory that is not inside an existing Git repository.
        commands: |
          ! git rev-parse --is-inside-work-tree >/dev/null 2>&1
        help: Follow this runbook from a fresh disposable project directory, not from
          the workshop repository, an existing Git repository, or a subdirectory
          of one.
      - kind: command
        name: Codex CLI
        contents: |
          - [Codex CLI](https://developers.openai.com/codex/cli)
        commands: codex --version
        help: Install Codex CLI and make sure `codex` is available on your PATH.
      - kind: command
        name: Tree
        contents: |
          - [Tree](https://oldmanprogrammer.net/source.php?dir=projects/tree)
        commands: tree --version
        help: Install Tree and make sure `tree` is available on your PATH.
      - kind: command
        name: Docker
        contents: |
          - [Docker](https://docs.docker.com/get-docker/)
        commands: |
          docker info >/dev/null
        help: Install Docker and start the Docker daemon before running this example.

  - type: Heading
    level: H2
    title: Initialise Project Repository

  - type: Markdown
    contents: |
      1. Initialise the project repository.

         When working with a coding agent, you need a reliable way to distinguish
         changes made by the agent from the state that already existed before the
         task started. Version control gives you that boundary.

         The pattern is: start from a clean worktree, let the agent perform a
         bounded task, then use Git to inspect exactly what changed before deciding
         whether to keep, revise, or discard the result.

  - type: Command
    commands: |
      git init

      cat <<'EOF' > '.gitignore'
      # Ignore the IDE and Development related files
      .idea/
      .oca/
      target/

      # Ignore the OS related files
      **/.DS_Store

      # Ignore the bootstrap file as this is not part of the runbook output
      /runbook.md
      EOF

      cat <<'EOF' > '.gitattributes'
      /mvnw text eol=lf
      *.cmd text eol=crlf
      EOF

      git add '.gitignore' '.gitattributes'
      git commit --message 'Add repository baseline files'
    indent: 3

  - type: Heading
    level: H2
    title: Establish Repository Instructions

  - type: Markdown
    contents: |
      A coding agent can only follow the context it has available. If you explain
      project conventions in one chat session, a later session may not have that
      conversation. Even when the files are the same, the agent may not know how you
      want commits shaped, documentation organised, domain language handled, or
      generated changes reviewed.

      Consider a simple example. In one session, tell the model how you want commit
      messages to be written.

  - type: Command
    commands: |
      codex exec - <<'EOF'
      Keep commits coherent. Each commit should contain one logical change, and unrelated repository workflow changes should be committed separately.

      When proposing commit messages, use:

      1. A short imperative subject line that starts with a verb.
      2. A body paragraph that explains why the change exists.

      Focus the body on motivation, context, or intent that cannot be determined from the diff. Avoid restating files changed or implementation details that are already visible in the commit.
      EOF
    output:
      caption: |
        The model’s output
      rewrite:
        - type: keep_between
          start_pattern: "^session id: [0-9a-fA-F-]+$"
          end: tokens used
          start_offset: 0
          end_offset: -1
          show_trim_markers: false
    capture:
      - name: session_id
        source: stderr
        stage: raw
        pattern: "session id: ([0-9a-fA-F-]+)"
    timeout: 1 minute

  - type: Markdown
    contents: |
      In the Codex app, ask the following follow-up question in the same chat.

      If you are running the terminal commands instead, use the session id from
      the previous command, `@{session_id}`, to continue
      working in the same session. The command below resumes that exact session. Your
      session id may be different.

  - type: Command
    commands: |
      codex exec resume '@{session_id}' - <<'EOF'
      List my commit message preference, please.
      EOF
    output:
      caption: |
        The model’s output
      rewrite:
        - type: keep_between
          start_pattern: "^session id: [0-9a-fA-F-]+$"
          end: tokens used
          start_offset: 0
          end_offset: -1
          show_trim_markers: false
    timeout: 1 minute

  - type: Markdown
    contents: |
      The resumed command shows the same session id,
      `@{session_id}`. That confirms Codex is continuing the
      existing session and can use the messages already in that conversation.

      The model can use the previous prompt to answer the question in the second prompt
      because both prompts belong to the same session.

      Now ask the same question in a new session, without resuming the captured
      session. A new session should not depend on context from the previous
      conversation.

  - type: Command
    commands: |
      codex exec - <<'EOF'
      List my commit message preference, please.
      EOF
    output:
      caption: |
        The model’s output
      rewrite:
        - type: keep_between
          start_pattern: "^session id: [0-9a-fA-F-]+$"
          end: tokens used
          start_offset: 0
          end_offset: -1
          show_trim_markers: false
    capture:
      - name: new_session_id
        source: stderr
        stage: raw
        pattern: "session id: ([0-9a-fA-F-]+)"
    timeout: 1 minute

  - type: Markdown
    contents: |
      The new command starts a different session:
      `@{new_session_id}`. That is not the session where we set the
      commit-message rules, which was `@{session_id}`. Because
      this prompt is in a new session, Codex does not have the earlier chat context
      from `@{session_id}`.

      The model may still give a plausible answer, but that answer is not grounded in
      a durable project instruction. It is only guessing from the current prompt,
      local files, or general commit-message conventions. That can lead to
      inconsistent behaviour across sessions, which is what `AGENTS.md` helps
      mitigate.

      `AGENTS.md` is a Markdown file that stores repository-level instructions for
      agent tools. There is nothing special about the Markdown syntax itself. What
      matters is the file name. Tools such as Codex know to read `AGENTS.md` and
      include its instructions when working in the repository.

      A simplified prompt sent by an agent tool may look like this:

      ```json
      [
        {
          "role": "system",
          "content": "..."
        },
        {
          "role": "user",
          "content": "[agents.md]\n..."
        },
        {
          "role": "user",
          "content": "Prompt 1 ..."
        },
        {
          "role": "assistant",
          "content": "Reply to prompt 1 ..."
        },
        {
          "role": "user",
          "content": "Prompt 2 ..."
        }
      ]
      ```

      You usually do not control the system message. It is provided by the agent tool.
      For project-specific guidance, use repository files such as `AGENTS.md` instead.

      `AGENTS.md` makes those expectations part of the repository. Future agent runs
      can read the file and recover the working rules without relying on memory from a
      previous chat.

  - type: Markdown
    contents: |
      1. Create the `AGENTS.md` file and define how to commit changes and how the
         directory will be initially organised.

  - type: Command
    commands: |
      cat <<'EOF' > 'AGENTS.md'
      # Repository Instructions

      ## Commit Messages

      Keep commits coherent. Each commit should contain one logical change, and unrelated repository workflow changes should be committed separately.

      When proposing commit messages, use:

      1. A short imperative subject line that starts with a verb.
      2. A body paragraph that explains why the change exists.

      Focus the body on motivation, context, or intent that cannot be determined from the diff. Avoid restating files changed or implementation details that are already visible in the commit.

      ## Ubiquitous Language

      Product, scope, requirements, slices, and production-readiness documents should use the project's ubiquitous language consistently.

      When introducing, changing, or discovering ambiguity in a domain-significant term, update `docs/domain/ubiquitous-language.md` or record the ambiguity as an open question in the relevant product artefact.

      Do not turn the ubiquitous language into a dump of every noun in the project. Capture terms that affect product behaviour, user experience, domain rules, data meaning, acceptance criteria, or implementation naming.

      ## Project README

      The repository root must contain a developer-facing `README.md`.

      Keep the top-level `README.md` short and practical. It should:

      - Describe what the project is and what problem it solves.
      - Explain prerequisites and the commands to build, test, and run the application locally.
      - If build, test, or run commands are not known yet, say what is missing instead of inventing commands, then replace that note once tooling exists.
      - Link to the relevant `docs/README.md` and other important project documentation instead of duplicating it.
      - Stay current when project structure, build tooling, runtime commands, or documentation locations change.

      ## Documentation Indexes

      Each documentation directory should contain a `README.md`.

      A directory `README.md` should explain the purpose of that directory and link to relevant child documentation:

      - The top-level `docs/README.md` links to subdirectory `README.md` files.
      - A subdirectory `README.md` describes that subdirectory and links to Markdown files in that subdirectory.
      - Keep indexes current when adding, moving, or deleting documentation files.
      EOF
    indent: 3

  - type: Markdown
    contents: |
      This runbook creates the root `AGENTS.md` file because these instructions apply
      to the whole project.

      A repository can contain more than one `AGENTS.md` file. The root file
      usually captures rules that apply everywhere. More specific directories can
      add their own instructions when part of the project needs different
      conventions. For example, a root `AGENTS.md` might define commit and
      documentation rules, while `backend/AGENTS.md` or `frontend/AGENTS.md` could
      add stack-specific guidance for those directories.
    indent: 3

  - type: Markdown
    contents: |
      2. Commit the repository instructions.

         In an interactive workflow, you can ask the agent to review the changed
         files, propose a commit message, and create the commit.

         ```text
         commit changes
         ```

         This runbook also shows the manual Git commands so you can see exactly what
         is committed at this checkpoint.
  - type: Command
    commands: |
      git add 'AGENTS.md'
      git commit \
        --message 'Add repository agent instructions' \
        --message 'Capture repository-level expectations for coherent commits, shared domain language, and practical documentation indexes.' \
        --message 'Keep product, scope, requirements, and slice artefacts easier to review as the project grows.'
    indent: 3

  - type: Heading
    level: H2
    title: Product Description

  - type: Markdown
    contents: |
      A product or feature usually starts as an idea, often captured in an email,
      message, ticket, or short note. In this runbook, we call that starting point the
      product description, even though it is usually rough and incomplete.

      A product description does not need to be complete or implementation-ready. Its
      job is to give us, as software engineers, enough context to identify the problem,
      intended users, useful outcomes, domain language, assumptions, and open questions.

      To simulate a real-world scenario, we will start from that initial stage.

  - type: Markdown
    contents: |
      1. Review the product description (`docs/product/description.md`).

  - type: Markdown
    contents: |
      2. Ask the model to apply the documentation rules from `AGENTS.md`.

         Now that the repository has durable instructions, we can ask the agent to
         use them. The first task is deliberately small: create or update the
         top-level `README.md` and documentation indexes so the project has a
         clear place for generated product, scope, requirements, and implementation
         documents.

         There is no need to resume a previous session for this step. From this point on,
         the runbook favours durable repository context over chat history. That makes the
         workflow more consistent across sessions and team members.

         Codex can discover `AGENTS.md` automatically when it runs in the repository.
         The prompt mentions `@AGENTS.md` anyway to make the dependency explicit for the
         reader and for tools or sessions where automatic discovery may differ.

  - type: Command
    commands: |
      codex exec - <<'EOF'
      Create or update the top-level `README.md` and any documentation `README.md` files required by @AGENTS.md.
      EOF
    timeout: 3 minutes
    indent: 3

  - type: Markdown
    contents: |
      (*Optional*) Inspect the README files created or updated by the agent. These
      files show how the repository instructions shaped the project and
      documentation indexes.
    indent: 3

  - type: Command
    commands: |
      tree --dirsfirst --sort=name --prune -P 'README.md'
    output:
      caption: |
        The `README.md` files
    indent: 3

  - type: Markdown
    contents: |
      Documentation is a good place to start with agentic coding. The work is useful,
      bounded, and easy to review. An agent can help keep README files linked and
      current, spot broken links, find inconsistencies or contradictions, and identify
      terminology that is used inconsistently.

      If you are new to agentic coding, use documentation tasks to practise the basic
      workflow: give the agent clear repository instructions, let it make a focused
      change, then review the diff before committing.
    indent: 3

  - type: Markdown
    contents: |
      3. Commit changes

         In an interactive workflow, you can ask the agent to review the changed
         files, propose a commit message, and create the commit.

         ```text
         commit changes
         ```

         This runbook also shows the manual Git commands so you can see exactly what
         is committed at this checkpoint.

  - type: Command
    commands: |
      git add 'README.md' 'docs/'
      git commit \
        --message 'Add project documentation indexes' \
        --message 'Create the initial README files so the project has a clear documentation structure before deriving scope, requirements, and implementation plans.'
    indent: 3

  - type: Heading
    level: H2
    title: Clarify Minimum Viable Product (MVP) Scope

  - type: Markdown
    contents: |
      A product description is usually too broad or ambiguous to implement
      directly. Before we ask an agent to create requirements or code, we first
      narrow the idea into an MVP scope.

      The MVP scope defines the first useful version of the product: what problem
      it will solve, who it is for, which outcomes matter, what is deliberately
      out of scope, and which assumptions or open questions still need attention.

      This gives us and the agent a smaller, clearer target. If we ask an agent to
      create the solution too early, it has to fill missing details with
      assumptions. For example, the product description may not say which
      technical stack to use, where the application will run, who will use it, or
      how users should authenticate.

      The product description captures the idea of what we want to build. The MVP
      scope turns that idea into a first buildable boundary and gives the human
      reviewer a checkpoint before the project moves into detailed requirements
      and implementation planning.

      We do not have to create the MVP scope by hand. The agent can help turn the
      product description into a scope document, especially when we give it a clear
      prompt for how to handle ambiguity, assumptions, non-goals, and open questions.

      After doing this a few times, the same prompt starts to become a reusable
      workflow. Keeping that workflow only in chat history makes it hard to share,
      review, version, and improve across a team.

      One option is to put the instructions in `AGENTS.md`. That can work, but it
      would make the repository instructions carry task-specific guidance that is
      only needed when creating scope. Since `AGENTS.md` is included with many
      agent requests, unnecessary detail can waste context and distract the model.

      A better fit is a skill. A skill packages the task-specific instructions for
      creating scope and is invoked only when that workflow is needed. In this
      runbook, the `create-scope` skill tells the model to clarify ambiguity before
      producing the scope, reducing uncertainty without turning the process into a
      heavy waterfall phase.

      Skills can be installed globally or stored in a repository. For project-specific
      skills, this runbook keeps them in the repository so they can be reviewed,
      version-controlled, and shared with the team. When someone clones the project,
      they get the same skill definitions as everyone else.

      For that reason, this runbook adds skills to the project instead of relying on
      global user-level skills.

  - type: Markdown
    contents: |
      1. Review the `create-scope` skill fixture
         (`../fixtures/skills/create-scope/SKILL.md`).

         Before copying the skill into the project, inspect the skill definition.
         Unlike `AGENTS.md`, which captures repository-wide instructions, a
         `SKILL.md` file defines one task-specific workflow.

  - type: DisplayFile
    path: ../fixtures/skills/create-scope/SKILL.md
    start_line: 1
    line_count: 10
    indent: 3

  - type: Markdown
    contents: |
      The YAML front matter at the top of `SKILL.md` provides metadata such as the
      skill name and description. The body contains the instructions the agent
      should follow when the skill is invoked.

      This keeps task-specific guidance separate from `AGENTS.md`. The repository
      instructions still apply, but the skill adds extra context only when this
      workflow is needed.
    indent: 3

  - type: Markdown
    contents: |
      2. Create a repository-scoped `create-scope` skill.

         A skill can be written manually, generated with help from the model, or
         copied from an existing definition. For this runbook, we use a prepared
         `create-scope` skill from the example fixtures so the rest of the workflow
         can focus on how the skill is used.

         The fixture is based on the repository skill at
         [skills/create-scope/SKILL.md](https://github.com/albertattard/skills/blob/main/skills/create-scope/SKILL.md).

  - type: Command
    commands: |
      mkdir -p '.codex/skills'
      cp -R '../fixtures/skills/create-scope' '.codex/skills/'
    indent: 3

  - type: Markdown
    contents: |
      Codex looks for project-specific skills under the `.codex` directory. Other
      agentic tools may use different conventions.

      (*Optional*) View the new skill directory structure.
    indent: 3

  - type: Command
    commands: |
      tree --dirsfirst --sort=name '.codex/skills/create-scope'
    output:
      caption: |
        The new skill directory structure
    indent: 3

  - type: Markdown
    contents: |
      The skill definition is in `.codex/skills/create-scope/SKILL.md`. The
      `.codex/skills/create-scope/agents/openai.yaml` file is specific to the Codex
      application and is used by the UI.
    indent: 3

  - type: Markdown
    contents: |
      3. Commit the skill.

         In an interactive workflow, you can ask the agent to review the changed
         files, propose a commit message, and create the commit.

         ```text
         commit changes
         ```

         This runbook also shows the manual Git commands so you can see exactly what
         is committed at this checkpoint.

  - type: Command
    commands: |
      git add '.codex/skills/create-scope'
      git commit \
        --message 'Add create scope skill' \
        --message 'Teach Codex to clarify product ideas and produce focused scope documents before implementation starts.'
    indent: 3

  - type: Markdown
    contents: |
      4. Apply the `create-scope` skill to clarify the product description and
         create the MVP scope when the scope is ready.

         ```text
         Use $create-scope to clarify @docs/product/description.md and create `docs/scopes/mvp-scope.md` when the scope is ready.
         ```

         In an interactive session, use the prompt above and answer the model’s
         questions one at a time. If you do not want to answer each question
         manually, the command below supplies prepared answers from
         `../fixtures/prompts/create-scope-answers.md`.

  - type: Command
    commands: |
      codex exec --sandbox workspace-write - <<EOF
      Use \$create-scope to clarify @docs/product/description.md and create \`docs/scopes/mvp-scope.md\` when the scope is ready.

      Use the following answers without asking follow-up questions. If further clarification is still needed, use your best judgement and keep things simple.

      $(cat '../fixtures/prompts/create-scope-answers.md')
      EOF
    timeout: 3 minutes
    indent: 3

  - type: Markdown
    contents: |
      5. Ask the model to apply the project README and documentation index rules from
         `AGENTS.md`.

         The scope step may have created new documentation directories or files. Before
         moving on, update the top-level `README.md` and any documentation index files
         required by `AGENTS.md` so the new documents are discoverable.

  - type: Command
    commands: |
      codex exec --sandbox workspace-write - <<'EOF'
      Create or update the top-level `README.md` and any documentation `README.md` files required by `AGENTS.md`.
      EOF
    timeout: 1 minute
    indent: 3

  - type: Markdown
    contents: |
      (*Optional*) Inspect the README files created or updated by the agent. These
      files show how the repository instructions shaped the project and
      documentation indexes.
    indent: 3

  - type: Command
    commands: |
      tree --dirsfirst --sort=name --prune -P 'README.md'
    output:
      caption: |
        The `README.md` files
    indent: 3

  - type: Markdown
    contents: |
      6. Commit changes

         In an interactive workflow, you can ask the agent to review the changed
         files, propose a commit message, and create the commit.

         ```text
         commit changes
         ```

         This runbook also shows the manual Git commands so you can see exactly what
         is committed at this checkpoint.

  - type: Command
    commands: |
      git add 'docs/'
      git commit \
        --message 'Add MVP scope' \
        --message 'Capture the first buildable unit so implementation can focus on proving the core implementation.'
    indent: 3

  - type: Heading
    level: H2
    title: Clarify Product Requirements Document (PRD)

  - type: Markdown
    contents: |
      Workflow position:

      ```text
      MVP scope
        -> product requirements document (PRD)  [current]
        -> vertical slices
      ```

      The MVP scope defines what should be built first and what should be left out.
      Before implementation planning, that scope needs to become a Product
      Requirements Document (PRD): a more explicit description of user behaviour,
      functional requirements, constraints, and acceptance expectations.

      The PRD is still product-focused. It should explain what the product must do
      without jumping straight into implementation tasks. This gives the model a
      stable bridge between the clarified scope and the vertical slices that follow.

      As before, we will introduce a new skill that takes a scope and turns it into product requirements document (PRD).

  - type: Markdown
    contents: |
      1. Create a repository-scoped `derive-product-requirements-document` skill.

         For convenience the skills are placed under the fixtures directory which can
         be easily copied.

  - type: Command
    commands: |
      cp -R '../fixtures/skills/derive-product-requirements-document' '.codex/skills/'
    indent: 3

  - type: Markdown
    contents: |
      (*Optional*) View the new skill directory structure.
    indent: 3

  - type: Command
    commands: |
      tree --dirsfirst --sort=name '.codex/skills/derive-product-requirements-document'
    output:
      caption: |
        The new skill directory structure
    indent: 3

  - type: Markdown
    contents: |
      2. Commit the skill.

         In an interactive workflow, you can ask the agent to review the changed
         files, propose a commit message, and create the commit.

         ```text
