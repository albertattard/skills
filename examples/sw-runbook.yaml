      git commit \
        --message 'Add architecture decision records' \
        --message 'Capture durable architecture decisions before deriving implementation tasks so downstream work can reference the technical constraints explicitly.'
    indent: 3

  - type: Heading
    level: H2
    title: Derive Implementation Tasks

  - type: Markdown
    contents: |
      1. Create a repository-scoped `derive-implementation-tasks` skill.

         This skill helps the model turn vertical slices, the path-to-production
         plan, architecture decision records, and repository context into ordered
         implementation task documents under `docs/tasks/`. The tasks should
         preserve traceability to slices, production-readiness work, and relevant
         ADRs, identify dependencies and readiness, group work by capability area,
         and avoid publishing remote tracker issues unless explicitly requested.

  - type: Command
    commands: |
      cp -R '.fixtures/skills/derive-implementation-tasks' '.codex/skills/'
    indent: 3

  - type: Markdown
    contents: |
      (*Optional*) Show the generated skill metadata.
    indent: 3

  - type: Command
    commands: |
      tree --dirsfirst --sort=name '.codex/skills/derive-implementation-tasks'
    output:
