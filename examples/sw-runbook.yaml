      1. Create a repository-scoped `derive-vertical-slices` skill.

         This skill helps the model turn a Product Requirements Document (PRD) into
         small, ordered vertical slice documents under `docs/slices/`. Each slice must
         be independently understandable, linked back to the source PRD, focused on a
         user-visible outcome, and avoid horizontal technical task breakdowns.

  - type: Command
    commands: |
      cp -R '.fixtures/skills/derive-vertical-slices' '.codex/skills/'
    indent: 3

  - type: Markdown
