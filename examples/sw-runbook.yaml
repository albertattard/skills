    output:
      caption: |
        The model’s output
      rewrite:
        - type: limit_lines
          last: 20
    timeout: 1 minute
    indent: 3

  - type: Markdown
    contents: |
      (*Optional*) List the files under the `docs` directory
    indent: 3

  - type: Command
    commands: |
      tree --dirsfirst --sort=name 'docs'
    output:
      caption: |
        The documentation files
    indent: 3

  - type: Markdown
    contents: |
      5. Commit changes

          In an interactive run, you can ask the model to analyse the modified files,
          create a commit message, and commit them using the following prompt.

          ```text
          commit changes
          ```

          The runbook uses manual Git commands so this step remains reproducible in
          environments where Codex cannot write to Git metadata.

  - type: Command
    commands: |
      git add 'docs/'
      git commit \
        --message 'Add implementation tasks' \
        --message 'Capture ordered, traceable implementation tasks derived from the vertical slices and production readiness plan.'
    indent: 3
