  - type: Heading
    level: H2
    title: Implement Ready Tasks

  - type: Markdown
    contents: |
      1. Create a repository-scoped `implement-task` skill.

         This skill helps the model implement one generated task from
         `docs/tasks/`. It checks that the worktree is clean, verifies the
         application baseline before starting, keeps implementation scoped to the
         selected task, prefers acceptance-level tests, runs final validation,
         and reports any remaining manual checks or follow-up work.

  - type: Command
    commands: |
      cp -R '.fixtures/skills/implement-task' '.codex/skills/'
    indent: 3

  - type: Markdown
    contents: |
      (*Optional*) Show the generated skill metadata.
    indent: 3

  - type: Command
    commands: |
      tree --dirsfirst --sort=name '.codex/skills/implement-task'
    output:
      caption: |
        The generated skill
    indent: 3

  - type: Markdown
    contents: |
      2. Commit the skill.

          The implementation skill requires a clean worktree before it starts, so
          the skill itself is committed before asking the model to implement a
          task.

  - type: Command
    commands: |
      git add '.codex/skills/implement-task'
      git commit \
        --message 'Add implementation task skill' \
        --message 'Add the reusable implementation workflow so generated task files can be executed with baseline checks, scoped tests, and final validation.'
    indent: 3

  - type: Markdown
    contents: |
      3. Apply the `implement-task` skill to the first ready implementation task.

         ```text
         Use $implement-task to implement the next incomplete ready task listed in @docs/tasks/README.md.
         ```

         The skill is responsible for checking task readiness, dependencies, the
         clean worktree preflight, baseline validation, task-scoped tests, and
         final full validation. After the task passes validation, the skill marks
         the task as `done` and keeps the task indexes current.

  - type: Command
    commands: |
      set -e

      TASK_ID="$(awk -F'|' '
        /TASK-[0-9]+/ && /ready-for-agent/ && $0 !~ /\|[[:space:]]*done[[:space:]]*\|/ {
          if (match($0, /TASK-[0-9]+/)) {
            print substr($0, RSTART, RLENGTH)
            exit
          }
        }
      ' 'docs/tasks/README.md')"

      if [ -z "$TASK_ID" ]; then
        echo "No incomplete ready tasks remain."
        exit 0
      fi

      TASK_FILE="$(find 'docs/tasks' -maxdepth 1 -type f -name "${TASK_ID}-*.md" -print -quit)"
      test -n "$TASK_FILE"

      codex exec --full-auto <<EOF
      Use \$implement-task to implement @$TASK_FILE.
      EOF

      git add .
      if git diff --cached --quiet; then
        echo "No changes were produced for ${TASK_ID}; stopping to avoid repeating the same task."
        exit 1
      fi

      git commit --message "Implement ${TASK_ID}"
    output:
      caption: |
        The model’s output
      rewrite:
        - type: limit_lines
          last: 40
    timeout: 30 minutes
    indent: 3

  - type: Markdown
    contents: |
      4. Apply the `implement-task` skill to the remaining ready implementation
         tasks.

         The runbook repeats the implementation process until no
         `ready-for-agent` task remains with a non-`done` status. Each completed
         task is committed separately with the task identifier in the commit
         subject.

  - type: Command
    commands: |
      set -e

      while true; do
        TASK_ID="$(awk -F'|' '
          /TASK-[0-9]+/ && /ready-for-agent/ && $0 !~ /\|[[:space:]]*done[[:space:]]*\|/ {
            if (match($0, /TASK-[0-9]+/)) {
              print substr($0, RSTART, RLENGTH)
              exit
            }
          }
        ' 'docs/tasks/README.md')"

        if [ -z "$TASK_ID" ]; then
          echo "No incomplete ready tasks remain."
          break
        fi

        TASK_FILE="$(find 'docs/tasks' -maxdepth 1 -type f -name "${TASK_ID}-*.md" -print -quit)"
        test -n "$TASK_FILE"

        codex exec --full-auto <<EOF
      Use \$implement-task to implement @$TASK_FILE.
      EOF

        git add .
        if git diff --cached --quiet; then
          echo "No changes were produced for ${TASK_ID}; stopping to avoid repeating the same task."
          exit 1
        fi

        git commit \
          --message "Implement ${TASK_ID}"
      done
    output:
      caption: |
        The model’s output
      rewrite:
        - type: limit_lines
          last: 40
    timeout: 120 minutes
    indent: 3

  - type: Markdown
    contents: |
      5. Review the result.

         Each implemented task is committed separately with the task identifier
         in the commit subject. Tasks that still need a human decision, manual
         action, or another generated task remain in `docs/tasks/`.
