  - type: Heading
    level: H2
    title: Derive Path to Production

  - type: Markdown
    contents: |
      1. Create a repository-scoped `derive-path-to-production` skill.

         This skill helps the model turn the Product Requirements Document (PRD),
         vertical slices, and repository context into a production readiness and
         release sequencing plan under `docs/production/`. The plan should identify
         the first releasable increment, release sequence, validation gates, rollback
         expectations, observability, configuration, data, security, operational
         ownership, risks, and open questions.

  - type: Command
    commands: |
      cp -R '.fixtures/skills/derive-path-to-production' '.codex/skills/'
    indent: 3

  - type: Markdown
    contents: |
      (*Optional*) Show the generated skill metadata.
    indent: 3

  - type: Command
    commands: |
      tree --dirsfirst --sort=name '.codex/skills/derive-path-to-production'
    output:
      caption: |
        The generated skill
    indent: 3

