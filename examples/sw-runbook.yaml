    indent: 3

  - type: Markdown
    contents: |
      2. Commit the skill.

          In an interactive run, you can ask the model to analyse the modified files,
          create a commit message, and commit them using the following prompt.

          ```text
          commit changes
          ```

          The runbook uses manual Git commands so this step remains reproducible in
          environments where Codex cannot write to Git metadata.

  - type: Command
    commands: |
      git add '.codex/skills/derive-implementation-tasks'
      git commit \
        --message 'Add implementation tasks skill' \
        --message 'Extend the reusable product workflow with a step that turns vertical slices and production-readiness planning into ordered, traceable implementation tasks.'
    indent: 3

  - type: Markdown
    contents: |
      3. Apply the `derive-implementation-tasks` skill to obtain the first
         implementation task plan.

         ```text
         Use $derive-implementation-tasks to convert @docs/slices/, @docs/production/path-to-production.md, and @docs/adr/ into ordered implementation task Markdown files.
         ```

         The runbook asks the model to avoid follow-up questions because it needs
         to run unattended. In an interactive session, you can use the prompt alone
         and answer questions about task granularity, capability grouping, or
         unresolved decisions one by one.

  - type: Command
    commands: |
      codex exec --full-auto <<'EOF'
      Use $derive-implementation-tasks to convert @docs/slices/, @docs/production/path-to-production.md, and @docs/adr/ into ordered implementation task Markdown files.

      Use the answers in @.fixtures/prompts/implementation-tasks-answers.md without asking follow-up questions. Do not create remote tracker issues. Write local Markdown task files under @docs/tasks/. Treat relevant ADRs as implementation constraints and reference them only in tasks they materially affect. If further clarification is still needed, use your best judgement, choose the smallest conservative assumption that fits the repository and source artefacts, and record the assumption and unresolved decision in the affected task files.
      EOF
    output:
      caption: |
        The model’s output
      rewrite:
        - type: limit_lines
          last: 20
    timeout: 10 minutes
    indent: 3

  - type: Markdown
    contents: |
      4. Ask the model to apply the documentation index rules from `AGENTS.md`.

  - type: Command
    commands: |
      codex exec --full-auto <<'EOF'
      Create any missing `README.md` files required by the documentation.
