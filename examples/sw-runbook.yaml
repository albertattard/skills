      git commit \
        --message 'Add path to production' \
        --message 'Capture the production readiness and release sequencing plan for the first releasable increment.'
    indent: 3

  - type: Heading
    level: H2
    title: Capture Architecture Decisions

  - type: Markdown
    contents: |
      1. Create a repository-scoped `capture-architecture-decisions` skill.

         This skill helps the model scan the generated planning artefacts for ADR
         candidates and turn durable architecture choices into Architecture
         Decision Records (ADRs) under `docs/adr/`. This checkpoint runs after
         the path-to-production plan because production readiness exposes the
         deployment, data, security, observability, integration, and operational
         trade-offs that are most likely to need ADRs.

  - type: Command
    commands: |
      cp -R '.fixtures/skills/capture-architecture-decisions' '.codex/skills/'
    indent: 3

  - type: Markdown
    contents: |
      (*Optional*) Show the generated skill metadata.
    indent: 3

  - type: Command
    commands: |
      tree --dirsfirst --sort=name '.codex/skills/capture-architecture-decisions'
    output:
      caption: |
        The generated skill
    indent: 3

  - type: Markdown
    contents: |
      2. Commit the skill.

          In an interactive run, you can ask the model to analyse the modified files,
          create a commit message, and commit them using the following prompt.

          ```text
          commit changes
          ```

          The runbook uses manual Git commands so this step remains reproducible in
          environments where Codex cannot write to Git metadata.

  - type: Command
    commands: |
      git add '.codex/skills/capture-architecture-decisions'
      git commit \
        --message 'Add architecture decision capture skill' \
        --message 'Extend the reusable product workflow with a checkpoint that records durable architecture choices before implementation tasks are derived.'
    indent: 3

  - type: Markdown
    contents: |
      3. Apply the `capture-architecture-decisions` skill to turn ADR candidates
         into architecture decision records.

         ```text
         Use $capture-architecture-decisions to scan @docs/ for ADR candidates and create or update Architecture Decision Records under @docs/adr/.
         ```

         The runbook asks the model to avoid follow-up questions because it needs
         to run unattended. In an interactive session, you can use the prompt alone
         and answer questions about unsettled architecture decisions one by one.

  - type: Command
    commands: |
      codex exec --full-auto <<'EOF'
      Use $capture-architecture-decisions to scan @docs/ for ADR candidates and create or update Architecture Decision Records under @docs/adr/.

      Use the answers in @.fixtures/prompts/architecture-decision-answers.md without asking follow-up questions. If a candidate is durable and the decision is clear from the source artefacts and repository context, create an accepted ADR. If a candidate is durable but the decision is unresolved, create a proposed ADR and record the uncertainty. If a candidate is not ADR-worthy, leave it in its source context and mention that in the final summary.
      EOF
    output:
      caption: |
        The model’s output
      rewrite:
        - type: limit_lines
          last: 20
    timeout: 3 minutes
    indent: 3

  - type: Markdown
    contents: |
      4. Ask the model to apply the documentation index rules from `AGENTS.md`.

  - type: Command
    commands: |
      codex exec --full-auto <<'EOF'
      Create any missing `README.md` files required by the documentation.
      EOF
    output:
      caption: |
        The model’s output
      rewrite:
        - type: limit_lines
          last: 20
    timeout: 1 minute
    indent: 3

  - type: Markdown
    contents: |
      (*Optional*) List the files under the `docs` directory
    indent: 3

  - type: Command
    commands: |
      tree --dirsfirst --sort=name 'docs'
    output:
      caption: |
