entries:
  - type: Heading
    level: H1
    title: PoC Tracker

  - type: Heading
    level: H2
    title: Prerequisites

  - type: Prerequisite
    checks:
      - kind: command
        name: Git
        contents: |
          - [Git](https://git-scm.com/downloads)
        commands: git --version
        help: Install Git and make sure `git` is available on your PATH.
      - kind: command
        name: Codex CLI
        contents: |
          - [Codex CLI](https://developers.openai.com/codex/cli)
        commands: codex --version
        help: Install Codex CLI and make sure `codex` is available on your PATH.
      - kind: command
        name: Tree
        contents: |
          - [Tree](https://oldmanprogrammer.net/source.php?dir=projects/tree)
        commands: tree --version
        help: Install Tree and make sure `tree` is available on your PATH.

  - type: Heading
    level: H2
    title: Create Project

  - type: Markdown
    contents: |
      1. Create project and initialise Git.

  - type: Command
    commands: |
      git init

      cat <<'EOF' > '.gitignore'
      # Ignore the IDE and Development related files
      .idea/
      .oca/
      target/

      # Ignore the OS related files
      **/.DS_Store

      # Ignore the sw-runbook.yaml and README.md files as these are not part of this demo
      /sw-runbook.yaml
      /README.md
      /.fixtures
      EOF

      cat <<'EOF' > '.gitattributes'
      /mvnw text eol=lf
      *.cmd text eol=crlf
      EOF

      git add '.gitignore' '.gitattributes'
      git commit --message 'Add repository baseline files'
    indent: 3

  - type: Markdown
    contents: |
      2. Create the `AGENTS.md` file and define how to commit changes and how the
         directory will be initially organised.

  - type: Command
    commands: |
      cat <<'EOF' > 'AGENTS.md'
      # Repository Instructions

      ## Commit Messages

      Keep commits coherent. Each commit should contain one logical change, and unrelated repository workflow changes should be committed separately.

      When proposing commit messages, use:

      1. A short imperative subject line that starts with a verb.
      2. A body paragraph that explains why the change exists.

      Focus the body on motivation, context, or intent that cannot be determined from the diff. Avoid restating files changed or implementation details that are already visible in the commit.

      ## Ubiquitous Language

      Product, scope, requirements, and slice documents should use the project's ubiquitous language consistently.

      When introducing, changing, or discovering ambiguity in a domain-significant term, update `docs/domain/ubiquitous-language.md` or record the ambiguity as an open question in the relevant product artefact.

      Do not turn the ubiquitous language into a dump of every noun in the project. Capture terms that affect product behaviour, user experience, domain rules, data meaning, acceptance criteria, or implementation naming.

      ## Documentation Indexes

      Each documentation directory should contain a `README.md`.

      A directory `README.md` should explain the purpose of that directory and link to relevant child documentation:

      - The top-level `docs/README.md` links to subdirectory `README.md` files.
      - A subdirectory `README.md` describes that subdirectory and links to Markdown files in that subdirectory.
      - Keep indexes current when adding, moving, or deleting documentation files.
      EOF
    indent: 3

  - type: Markdown
    contents: |
      3. Commit changes

         In an interactive run, you can ask the model to analyse the modified
         files, create a commit message, and commit them using the following
         prompt.

         ```text
         commit changes
         ```

         The runbook uses manual Git commands so this step remains reproducible
         in environments where Codex cannot write to Git metadata.
  - type: Command
    commands: |
      git add 'AGENTS.md'
      git commit \
        --message 'Add repository agent instructions' \
        --message 'Capture repository-level expectations for coherent commits, shared domain language, and practical documentation indexes.' \
        --message 'Keep product, scope, requirements, and slice artefacts easier to review as the project grows.'
    indent: 3

  - type: Heading
    level: H2
    title: Create Product Description

  - type: Markdown
    contents: |
      1. Create the product description (`docs/product/description.md`).

  - type: Command
    commands: |
      mkdir -p 'docs/product'

      cat <<'EOF' > 'docs/product/description.md'
      # Product Description

      Learning German often feels like memorizing disconnected rules and vocabulary, leading to frustration, boredom, and slow progress. Traditional methods rely heavily on repetition and passive learning, which can make it difficult for learners to stay engaged and truly understand how the language works in practice.

      This application is designed to change that by offering an interactive, practice-driven learning experience that emphasizes understanding through doing. Instead of passively consuming content, users actively engage with the language through a variety of dynamic exercises that reinforce both intuition and correctness.

      The platform is structured into progressive learning modules, starting with foundational concepts such as definite articles (der, die, das), and gradually advancing into more complex topics like accusative and dative cases, sentence structure, and grammatical transformations. Each module builds on the previous one, ensuring a clear sense of progression and mastery.

      To maintain engagement and avoid repetition fatigue, the application incorporates multiple interaction styles. These include:

      - Multiple-choice questions for quick recognition
      - Word-order exercises where users construct sentences from scrambled components
      - Typed input tasks to encourage active recall and deeper processing

      A key differentiator is the integration of visual and contextual learning. Rather than presenting isolated words, the app connects language to real-world meaning through imagery and contextual cues. This approach mirrors how humans naturally acquire language, by associating words with experiences and environments, making learning more intuitive and memorable.

      Immediate feedback is central to the experience. Users are not only told whether an answer is correct or incorrect, but also guided to understand why, reinforcing learning at every step. The goal is for each interaction to feel like measurable progress rather than rote repetition.

      Ultimately, the application aims to make learning German feel less like a chore and more like an engaging, evolving challenge, where users build confidence through consistent, meaningful practice.
      EOF
    indent: 3

  - type: Markdown
    contents: |
      2. Ask the model to apply the documentation index rules from `AGENTS.md`.

  - type: Command
    commands: |
      codex exec --full-auto <<'EOF'
      Create any missing `README.md` files required by the documentation.
      EOF
    output:
      caption: |
        The model’s output
      rewrite:
        - type: limit_lines
          last: 20
    timeout: 1 minute
    indent: 3

  - type: Markdown
    contents: |
      (*Optional*) List the files under the `docs` directory
    indent: 3

  - type: Command
    commands: |
      tree --sort=name 'docs'
    output:
      caption: |
        The documentation files
    indent: 3

  - type: Markdown
    contents: |
      3. Commit changes

          In an interactive run, you can ask the model to analyse the modified files,
          create a commit message, and commit them using the following prompt.

          ```text
          commit changes
          ```

          The runbook uses manual Git commands so this step remains reproducible in
          environments where Codex cannot write to Git metadata.

  - type: Command
    commands: |
      git add 'docs/'
      git commit \
        --message 'Add product description' \
        --message 'Capture the initial product direction before narrowing it into a first minimum viable product (MVP) scope document.'
    indent: 3

  - type: Heading
    level: H2
    title: Create Minimum Viable Product (MVP) Scope

  - type: Markdown
    contents: |
      1. Create a repository-scoped `create-scope` skill.

         The skill will help the model turn the product description into a clear
         scope before implementation starts.

  - type: Command
    commands: |
      mkdir -p '.codex/skills'
      cp -R '.fixtures/skills/create-scope' '.codex/skills/'
    indent: 3

  - type: Markdown
    contents: |
      (*Optional*) Show the generated skill metadata.
    indent: 3

  - type: Command
    commands: |
      tree --sort=name '.codex/skills/create-scope'
    output:
      caption: |
        The generated skill
    indent: 3

  - type: Markdown
    contents: |
      2. Commit the skill.

          In an interactive run, you can ask the model to analyse the modified files,
          create a commit message, and commit them using the following prompt.

          ```text
          commit changes
          ```

          The runbook uses manual Git commands so this step remains reproducible in
          environments where Codex cannot write to Git metadata.

  - type: Command
    commands: |
      git add '.codex/skills/create-scope'
      git commit \
        --message 'Add create scope skill' \
        --message 'Teach Codex to clarify product ideas and produce focused scope documents before implementation starts.'
    indent: 3

  - type: Markdown
    contents: |
      3. Apply the `create-scope` skill to obtain the first scope document, usually
         referred to as the MVP Scope.

         ```text
         Use $create-scope to clarify @docs/product/description.md before we create requirements or scaffold the application and create the `docs/scopes/mvp-scope.md`.
         ```

         The runbook provides answers up front because it needs to run unattended. In
         an interactive session, you can use the prompt alone and answer the questions
         one by one.

  - type: Command
    commands: |
      codex exec --full-auto <<'EOF'
      Use $create-scope to clarify @docs/product/description.md before we create requirements or scaffold the application and create the `docs/scopes/mvp-scope.md`.

      In this case, don’t ask me questions and use the answers shown below instead. In case you still have further questions, use your best judgement and keep things simple.

      Q: Who is the first real user we are designing for: an absolute beginner learning German from scratch, or a learner who already knows basic vocabulary but struggles with grammar like articles and cases?
      A: This application is targeted for absolute beginners learning German from scratch. More experienced users can too use the application as it provides different levels. The first level will be very easy and assumes no prior knowledge of the German Language, while subsequent levels may depend on previous levels.

      Q: What is the smallest first-level behaviour that would prove the app is useful for absolute beginners: learning definite articles with nouns (der, die, das), learning basic vocabulary from images, or forming very simple sentences?
      A: The first level would be learning definite articles with nouns (der, die, das). The learner will be shown an image of a noun, such as an apple, and will be provided the three articles (der, die, das). The noun is also pronounced, such as “Apfel”, so that the learner can combine the image, audio and word together simulating real life learning as much as possible. When the learner selects the right article, the audio of the article followed by the noun is played, such as “der Apfel”. If the learner selects the wrong article, the correct article is highlighted and the learner has to go again. When the learner is shown the next noun only after they select the correct article and the audio has finished playing.

      Q: What should count as completing the first level: answering a fixed set of nouns correctly once, reaching a mastery threshold after repeated practice, or simply progressing through a short guided lesson with no score?
      A: Completion for the first level would be correctly answering 25 distinct nouns. Each level will have its own threshold which may change over time as we learn more about the experience. But for the MVP, we can assume that once the learner answers 25 distinct nouns the first level is marked as complete. The learner can always go back to a level at any point in time and practice as much as they like.
      I would like to stress out an important point here. Why we would like to keep score so that the learner does not feel overwhelmed by starting a level that may be too hard for them, the learner should not be encouraged to grid or collect points. The goal should be learning. So prefer, “learnt 10 nouns” over “collected 10 points”.
      EOF
    output:
      caption: |
        The model’s output
      rewrite:
        - type: limit_lines
          last: 20
    timeout: 5 minutes
    indent: 3

  - type: Markdown
    contents: |
      4. Ask the model to apply the documentation index rules from `AGENTS.md`.

  - type: Command
    commands: |
      codex exec --full-auto <<'EOF'
      Create any missing `README.md` files required by the documentation.
      EOF
    output:
      caption: |
        The model’s output
      rewrite:
        - type: limit_lines
          last: 20
    timeout: 2 minutes
    indent: 3

  - type: Markdown
    contents: |
      (*Optional*) List the files under the `docs` directory
    indent: 3

  - type: Command
    commands: |
      tree --sort=name 'docs'
    output:
      caption: |
        The documentation files
    indent: 3

  - type: Markdown
    contents: |
      5. Commit changes

          In an interactive run, you can ask the model to analyse the modified files,
          create a commit message, and commit them using the following prompt.

          ```text
          commit changes
          ```

          The runbook uses manual Git commands so this step remains reproducible in
          environments where Codex cannot write to Git metadata.

  - type: Command
    commands: |
      git add 'docs/'
      git commit \
        --message 'Add MVP scope' \
        --message 'Capture the first buildable unit so implementation can focus on proving the core implementation.'
    indent: 3

  - type: Heading
    level: H2
    title: Derive Product Requirements Document

  - type: Markdown
    contents: |
      1. Create a repository-scoped `derive-product-requirements-document` skill.

         This skill turns an agreed scope into a Product Requirements Document that is detailed enough to derive vertical slices.

  - type: Command
    commands: |
      mkdir -p '.codex/skills/derive-product-requirements-document/agents'

      # Create the skill file
      cat <<'EOF' > '.codex/skills/derive-product-requirements-document/SKILL.md'
      ---
      name: derive-product-requirements-document
      description: Use when Codex needs to convert an agreed product scope, MVP scope, or clarified feature scope into a Product Requirements Document before deriving vertical slices or implementation plans. The skill expands scope and lean-inception-style decisions into product-facing requirements, goals, non-goals, user journeys, acceptance criteria, success measures, constraints, risks, and open questions without inventing unresolved product decisions.
      ---

      # Derive Product Requirements Document

      ## Overview

      Turn an agreed scope into a practical Product Requirements Document that is detailed enough to guide slicing and implementation.

      Prefer clarity over ceremony. The PRD should preserve product intent, carry forward lean-inception-style decisions, expose unresolved decisions, and avoid technical design unless a technical constraint changes product requirements.

      ## Inputs

      Start from the most specific scope artefact available, usually one of:

      - `docs/scopes/*.md`
      - a clarified feature scope
      - a user-provided scope document

      Inspect the product description and related docs when they clarify intent, but do not expand the PRD beyond the agreed scope without calling it out.

      ## Workflow

      1. Restate the product outcome, first user, and smallest useful behaviour from the scope.
      2. Carry forward the Not List as PRD non-goals; do not let excluded future ideas become current requirements.
      3. Translate trade-off decisions into constraints or decision notes that can guide later slicing.
      4. Extract the core user journey and required user-visible behaviours.
      5. Convert requirements into observable acceptance criteria.
      6. Capture success measures that reflect user value, not vanity metrics.
      7. Record constraints, risks, and open questions, including assumptions raised during scoping.
      8. Preserve domain-significant terms from the scope and check whether `docs/domain/ubiquitous-language.md` needs an update or an ambiguity note.
      9. Ask the user when the PRD would otherwise require inventing a product decision.
      10. Include a `Source` section that links to the scope document used as input.
      11. Write or update the PRD as Markdown under `docs/requirements/`, and keep the directory `README.md` current when files are added, moved, or deleted.

      ## Lean Inception Inputs

      When the scope contains lean-inception-style outputs, map them into the PRD instead of creating separate ceremony sections:

      - Vision, elevator pitch, or product intent -> `Summary`, `Problem`, and `Goals`.
      - First user, persona, or beneficiary -> `Target User`.
      - Smallest useful behaviour or core learning loop -> `User Journeys`, `Functional Requirements`, and `Acceptance Criteria`.
      - Not List or out-of-scope decisions -> `Non-Goals`.
      - Trade-off sliders or decision priorities -> `Constraints` or explicit product decisions.
      - Heaven/Hell, risks, or failure scenarios -> `Risks`, `Success Measures`, and relevant acceptance criteria.
      - Open questions and ambiguous terms -> `Open Questions` and, when domain-significant, ubiquitous language updates.

      ## File Naming

      Use a focussed, kebab-case filename:

      ```text
      docs/requirements/product-requirements-document.md
      ```

      For a scoped feature PRD, use the feature name:

      ```text
      docs/requirements/article-practice-prd.md
      ```

      Avoid scattering one PRD across multiple files unless the product is large enough to justify it.

      ## PRD Template

      Use this structure:

      ```markdown
      # Product Requirements Document

      ## Source

      Derived from:

      - [scope document](../scopes/mvp-scope.md)

      ## Summary

      ## Target User

      ## Problem

      ## Goals

      ## Non-Goals

      ## User Journeys

      ## Functional Requirements

      ## Acceptance Criteria

      ## Success Measures

      ## Constraints

      ## Risks

      ## Open Questions
      ```

      Keep sections concise. If a section does not apply, say why or omit it when that improves clarity.

      Adjust the source link to match the actual input path. For example, if the PRD is created at `docs/requirements/product-requirements-document.md` from `docs/scopes/mvp-scope.md`, link to `../scopes/mvp-scope.md`.

      ## Quality Bar

      A good PRD:

      - makes product behaviour explicit enough to derive vertical slices
      - separates goals from non-goals
      - carries forward the scope's smallest useful behaviour, Not List, trade-offs, risks, and open questions
      - describes user-visible requirements rather than implementation tasks
      - includes acceptance criteria that can be verified
      - preserves open questions instead of pretending they are answered

      A poor PRD:

      - restates the scope without adding decision clarity
      - hides unresolved assumptions
      - drops scope decisions that should constrain implementation
      - turns into a technical architecture document
      - includes future ideas as current requirements
      - uses success metrics that do not reflect user learning or user value

      ## Output

      After creating or revising the PRD, summarise:

      - the PRD file created or changed
      - the major product decisions captured
      - the lean-inception-style inputs carried forward or intentionally omitted
      - the open questions that remain
      - whether the PRD is ready for `derive-vertical-slices`
      EOF

      # Create the metadata used by Codex-style clients how to present the skill in the UI
      cat <<'EOF' > '.codex/skills/derive-product-requirements-document/agents/openai.yaml'
      interface:
        display_name: "Derive Product Requirements Document"
        short_description: "Turn agreed scope into a practical PRD"
        default_prompt: "Use $derive-product-requirements-document to convert the agreed scope and lean-inception-style decisions into a product requirements document."
      EOF
    indent: 3

  - type: Markdown
    contents: |
      (*Optional*) Show the generated skill metadata.
    indent: 3

  - type: Command
    commands: |
      tree --sort=name '.codex/skills/derive-product-requirements-document'
    output:
      caption: |
