        --message 'Extend the reusable product workflow with a step that turns product requirements into ordered implementation slices.'
    indent: 3

  - type: Markdown
    contents: |
      3. Apply the `derive-vertical-slices` skill to obtain the first set of
         vertical slices.

  - type: Command
    commands: |
      codex exec --full-auto <<'EOF'
      Use $derive-vertical-slices to convert @docs/requirements/product-requirements-document.md into ordered vertical slice documents.
      EOF
