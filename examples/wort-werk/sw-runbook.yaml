  - type: Command
    commands: |
      git add 'docs/'
      git commit \
        --message 'Add product requirements' \
        --message 'Capture the MVP requirements derived from the agreed scope so the next workflow step can split the requirements into vertical slices.'
    indent: 3

  - type: Heading
    level: H2
    title: Derive Vertical Slices

  - type: Markdown
    contents: |
      1. Create a repository-scoped `derive-vertical-slices` skill.

         This skill helps the model turn a Product Requirements Document (PRD) into
         small, ordered vertical slice documents under `docs/slices/`. Each slice must
         be independently understandable, linked back to the source PRD, focused on a
         user-visible outcome, and avoid horizontal technical task breakdowns.

  - type: Command
    commands: |
      mkdir -p '.codex/skills/derive-vertical-slices/agents'

      # Create the skill file
      cat <<'EOF' > '.codex/skills/derive-vertical-slices/SKILL.md'
      ---
      name: derive-vertical-slices
      description: Use when Codex needs to convert a Product Requirements Document into ordered vertical slice Markdown files. Prefer PRDs under docs/requirements/ as input; use scope documents only when the PRD step is intentionally skipped. The skill derives user-visible end-to-end slices, avoids horizontal technical task breakdowns, asks for clarification when slice boundaries are ambiguous, and writes slice documents under docs/slices/.
      ---

      # Derive Vertical Slices

      ## Overview

      Turn a Product Requirements Document into small, ordered vertical slices that can be implemented and reviewed one at a time.

      Prefer user-visible outcomes over technical layers. A slice should be demoable or verifiable independently, even when it is intentionally thin.

      ## Inputs

      Start from the most specific requirements artefact available:

      - `docs/requirements/*.md`

      Use a scope document only when the PRD step is intentionally skipped:

      - `docs/scopes/*.md`
      - a clarified feature description
      - a user-provided scope document

      Inspect nearby docs when they clarify intent, but do not expand scope beyond the selected source without calling it out.

      ## Workflow

      1. Restate the core outcome from the PRD or selected source document.
      2. Identify the smallest end-to-end behaviour that proves the core loop.
      3. Derive ordered slices where each slice adds one meaningful user-visible capability.
      4. Push technical setup, scaffolding, data modelling, tests, and styling into slices only when needed to deliver that slice.
      5. Challenge horizontal slices such as "build UI", "add data model", "wire storage", or "set up persistence"; rewrite them as end-to-end outcomes.
      6. Ask the user before writing files if slice boundaries, count, or ordering materially affect product direction.
      7. Include a `Source` section in each slice file that links to the PRD or source document used as input.
      8. Write one Markdown file per slice under `docs/slices/`.

      ## File Naming

      Use zero-padded numeric prefixes and kebab-case titles:

      ```text
      docs/slices/0001-create-poc-proposal.md
      docs/slices/0002-filter-pocs-by-state.md
      ```

      Keep each file focused on one slice.

      ## Slice Template

      Use this structure for each slice:

      ```markdown
      # Slice Title

      ## Source

      Derived from:

      - [product requirements document](../requirements/product-requirements-document.md)

      ## Outcome

      Describe the user-visible result in one or two sentences.

      ## Includes

      - List behaviour, content, UI, state, and verification needed for this slice.

      ## Excludes

      - List tempting work that should remain out of this slice.

      ## Acceptance Criteria

      - Use observable criteria that can be manually verified or tested.

      ## Notes

      - Capture dependencies, sequencing, risks, or open questions.
      ```

      Omit `Notes` only when there is nothing useful to say.

      Adjust the source link to match the actual input path. For example, if a slice is created at `docs/slices/0001-create-poc-proposal.md` from `docs/requirements/product-requirements-document.md`, link to `../requirements/product-requirements-document.md`.

      ## Quality Bar

      A good slice:

      - cuts through the experience end to end
      - can be demonstrated independently
      - has a clear user or learner outcome
      - is small enough to implement without dragging in unrelated future scope
      - leaves the codebase in a coherent state

      A poor slice:

      - is only a technical layer
      - cannot be observed by a user
      - exists mainly to prepare for imagined future work
      - bundles several unrelated outcomes together

      ## Output

      After creating or revising slice files, summarise:

      - slice files created or changed
      - the recommended first implementation slice
      - any scope decisions or open questions that still need user confirmation
      EOF

      # Create the metadata used by Codex-style clients to present the skill in the UI
      cat <<'EOF' > '.codex/skills/derive-vertical-slices/agents/openai.yaml'
      interface:
        display_name: "Derive Vertical Slices"
        short_description: "Turn requirements into vertical slices"
        default_prompt: "Use $derive-vertical-slices to convert the product requirements document into ordered Markdown vertical slice files."
      EOF
    indent: 3

  - type: Markdown
    contents: |
