entries:
  - type: Heading
    level: H1
    title: PoC Tracker

  - type: Heading
    level: H2
    title: Prerequisites

  - type: Prerequisite
    checks:
      - kind: command
        name: Git
        contents: |
          - [Git](https://git-scm.com/downloads)
        commands: git --version
        help: Install Git and make sure `git` is available on your PATH.
      - kind: command
        name: Codex CLI
        contents: |
          - [Codex CLI](https://developers.openai.com/codex/cli)
        commands: codex --version
        help: Install Codex CLI and make sure `codex` is available on your PATH.
      - kind: command
        name: Tree
        contents: |
          - [Tree](https://oldmanprogrammer.net/source.php?dir=projects/tree)
        commands: tree --version
        help: Install Tree and make sure `tree` is available on your PATH.

  - type: Heading
    level: H2
    title: Create Project

  - type: Markdown
    contents: |
      1. Create project and initialise Git.

  - type: Command
    commands: |
      git init

      cat <<'EOF' > '.gitignore'
      # Ignore the IDE and Development related files
      .idea/
      .oca/
      target/

      # Ignore the OS related files
      **/.DS_Store

      # Ignore the sw-runbook.yaml and README.md files as these are not part of this demo
      /sw-runbook.yaml
      /README.md
      /.fixtures
      EOF

      cat <<'EOF' > '.gitattributes'
      /mvnw text eol=lf
      *.cmd text eol=crlf
      EOF

      git add '.gitignore' '.gitattributes'
      git commit --message 'Add repository baseline files'
    indent: 3

  - type: Markdown
    contents: |
      2. Create the `AGENTS.md` file and define how to commit changes and how the
         directory will be initially organised.

  - type: Command
    commands: |
      cat <<'EOF' > 'AGENTS.md'
      # Repository Instructions

      ## Commit Messages

      Keep commits coherent. Each commit should contain one logical change, and unrelated repository workflow changes should be committed separately.

      When proposing commit messages, use:

      1. A short imperative subject line that starts with a verb.
      2. A body paragraph that explains why the change exists.

      Focus the body on motivation, context, or intent that cannot be determined from the diff. Avoid restating files changed or implementation details that are already visible in the commit.

      ## Ubiquitous Language

      Product, scope, requirements, and slice documents should use the project's ubiquitous language consistently.

      When introducing, changing, or discovering ambiguity in a domain-significant term, update `docs/domain/ubiquitous-language.md` or record the ambiguity as an open question in the relevant product artefact.

      Do not turn the ubiquitous language into a dump of every noun in the project. Capture terms that affect product behaviour, user experience, domain rules, data meaning, acceptance criteria, or implementation naming.

      ## Documentation Indexes

      Each documentation directory should contain a `README.md`.

      A directory `README.md` should explain the purpose of that directory and link to relevant child documentation:

      - The top-level `docs/README.md` links to subdirectory `README.md` files.
      - A subdirectory `README.md` describes that subdirectory and links to Markdown files in that subdirectory.
      - Keep indexes current when adding, moving, or deleting documentation files.
      EOF
    indent: 3

  - type: Markdown
    contents: |
      3. Commit changes

         In an interactive run, you can ask the model to analyse the modified
         files, create a commit message, and commit them using the following
         prompt.

         ```text
         commit changes
         ```

         The runbook uses manual Git commands so this step remains reproducible
         in environments where Codex cannot write to Git metadata.
  - type: Command
    commands: |
      git add 'AGENTS.md'
      git commit \
        --message 'Add repository agent instructions' \
        --message 'Capture repository-level expectations for coherent commits, shared domain language, and practical documentation indexes.' \
        --message 'Keep product, scope, requirements, and slice artefacts easier to review as the project grows.'
    indent: 3

  - type: Heading
    level: H2
    title: Create Product Description

  - type: Markdown
    contents: |
      1. Create the product description (`docs/product/description.md`).

  - type: Command
    commands: |
      mkdir -p 'docs/product'

      cat <<'EOF' > 'docs/product/description.md'
      # Product Description

      Managing Proof of Concepts (PoCs) across an organisation is often fragmented and opaque. Information is scattered across emails, chat threads, and informal updates, making it difficult for managers to understand the current status, ownership, and progress of each initiative. This lack of visibility leads to missed risks, delayed interventions, and lost learning opportunities.

      The PoC Tracker is a web-based application designed to provide a centralised, structured view of all ongoing and completed PoCs within an organisation. Its primary goal is to give managers clear, real-time insight into what is being worked on, who is responsible, and how each PoC is progressing.

      At its core, the system organises PoCs into a defined lifecycle with clearly distinguishable states:

      | State              | Description                                                                       |
      | ------------------ | --------------------------------------------------------------------------------- |
      | **Proposal**       | The PoC has been pitched and is awaiting customer feedback                        |
      | **Planning**       | The PoC has been approved and scope and success criteria are being defined        |
      | **Implementation** | The PoC is actively being implemented and technical work is in progress           |
      | **Blocked**        | Progress on the PoC is currently halted due to an issue requiring attention       |
      | **Evaluation**     | Implementation is complete and the PoC is under customer evaluation               |
      | **Accepted**       | The PoC has been evaluated and confirmed as successful                            |
      | **Rejected**       | The PoC has been evaluated and did not meet expectations, triggering a postmortem |

      This structured lifecycle enables consistent tracking and makes it easy to identify bottlenecks, stalled efforts, and successful outcomes across the portfolio.

      Each PoC record captures essential ownership and context, including the responsible internal owner, the customer involved, and key metadata needed for accountability and reporting.

      A central feature of the application is the **journal system**, which provides a chronological narrative of each PoC. Every update—whether it’s a progress note, a decision, or a state transition—is recorded as a journal entry. This creates a complete, transparent history that can be read end-to-end, allowing stakeholders to quickly understand what happened, why decisions were made, and how outcomes were reached.

      By combining structured state tracking with rich, time-ordered activity logs, the PoC Tracker transforms scattered updates into a coherent, auditable story. Managers can quickly assess risk (e.g., blocked PoCs), monitor progress across teams, and ensure that both successes and failures contribute to organisational learning.

      Ultimately, the PoC Tracker aims to replace fragmented communication with clarity, improve accountability, and turn every PoC into a source of actionable insight.
      EOF
    indent: 3

  - type: Markdown
    contents: |
      2. Ask the model to apply the documentation index rules from `AGENTS.md`.

  - type: Command
    commands: |
      codex exec --full-auto <<'EOF'
      Create any missing `README.md` files required by the documentation.
      EOF
    output:
      caption: |
        The model’s output
      rewrite:
        - type: limit_lines
          last: 20
    timeout: 1 minute
    indent: 3

  - type: Markdown
    contents: |
      (*Optional*) List the files under the `docs` directory
    indent: 3

  - type: Command
    commands: |
      tree --sort=name 'docs'
    output:
      caption: |
        The documentation files
    indent: 3

  - type: Markdown
    contents: |
      3. Commit changes

          In an interactive run, you can ask the model to analyse the modified files,
          create a commit message, and commit them using the following prompt.

          ```text
          commit changes
          ```

          The runbook uses manual Git commands so this step remains reproducible in
          environments where Codex cannot write to Git metadata.

  - type: Command
    commands: |
      git add 'docs/'
      git commit \
        --message 'Add product description' \
        --message 'Capture the initial product direction before narrowing it into a first minimum viable product (MVP) scope document.'
    indent: 3

  - type: Heading
    level: H2
    title: Create Minimum Viable Product (MVP) Scope

  - type: Markdown
    contents: |
      1. Create a repository-scoped `create-scope` skill.

         The skill will help the model turn the product description into a clear
         scope before implementation starts.

  - type: Command
    commands: |
      mkdir -p '.codex/skills'
      cp -R '.fixtures/skills/create-scope' '.codex/skills/'
    indent: 3

  - type: Markdown
    contents: |
      (*Optional*) Show the generated skill metadata.
    indent: 3

  - type: Command
    commands: |
      tree --sort=name '.codex/skills/create-scope'
    output:
      caption: |
        The generated skill
    indent: 3

  - type: Markdown
    contents: |
      2. Commit the skill.

          In an interactive run, you can ask the model to analyse the modified files,
          create a commit message, and commit them using the following prompt.

          ```text
          commit changes
          ```

          The runbook uses manual Git commands so this step remains reproducible in
          environments where Codex cannot write to Git metadata.

  - type: Command
    commands: |
      git add '.codex/skills/create-scope'
      git commit \
        --message 'Add create scope skill' \
        --message 'Teach Codex to clarify product ideas and produce focused scope documents before implementation starts.'
    indent: 3

  - type: Markdown
    contents: |
      3. Apply the `create-scope` skill to obtain the first scope document, usually
         referred to as the MVP Scope.

         ```text
         Use $create-scope to clarify @docs/product/description.md before we create requirements or scaffold the application and create the `docs/scopes/mvp-scope.md`.
         ```

         The runbook provides answers up front because it needs to run unattended. In
         an interactive session, you can use the prompt alone and answer the questions
         one by one.

  - type: Command
    commands: |
      codex exec --full-auto <<'EOF'
      Use $create-scope to clarify @docs/product/description.md before we create requirements or scaffold the application and create the `docs/scopes/mvp-scope.md`.

      In this case, don’t ask me questions and use the answers shown below instead. In case you still have further questions, use your best judgement and keep things simple.

      Q: For the first version, what single workflow must prove the product is useful?
      A: A manager can scan all PoCs, identify blocked or stale work, and decide where to intervene.

      Q: In the manager triage view, what should count as a stale PoC?
      A: Use a concrete default: any non-terminal PoC with no journal entry or state change for seven calendar days.

      Q: When the manager “decides where to intervene,” should the MVP stop at surfacing the PoCs that need attention, or should it let the manager record/assign an intervention action inside the app?
      A: Stop at surfacing the PoCs that need attention and letting the manager open the PoC context. Recording assignments or intervention tasks would pull the MVP towards workflow management.

      Q: For the MVP, how do PoC records and journal/state updates get into the system?
      A: PoC records should be maintained manually in the app, with only the minimal create, edit, journal entry, and state update capabilities needed to keep the manager triage view accurate.
      EOF
    output:
      caption: |
        The model’s output
      rewrite:
        - type: limit_lines
          last: 20
    timeout: 5 minutes
    indent: 3

  - type: Markdown
    contents: |
      4. Ask the model to apply the documentation index rules from `AGENTS.md`.

  - type: Command
    commands: |
      codex exec --full-auto <<'EOF'
      Create any missing `README.md` files required by the documentation.
      EOF
    output:
      caption: |
        The model’s output
      rewrite:
        - type: limit_lines
          last: 20
    timeout: 2 minutes
    indent: 3

  - type: Markdown
    contents: |
      (*Optional*) List the files under the `docs` directory
    indent: 3

  - type: Command
    commands: |
      tree --sort=name 'docs'
    output:
      caption: |
        The documentation files
    indent: 3

  - type: Markdown
    contents: |
      5. Commit changes

          In an interactive run, you can ask the model to analyse the modified files,
          create a commit message, and commit them using the following prompt.

          ```text
          commit changes
          ```

          The runbook uses manual Git commands so this step remains reproducible in
          environments where Codex cannot write to Git metadata.

  - type: Command
    commands: |
      git add 'docs/'
      git commit \
        --message 'Add MVP scope' \
        --message 'Capture the first buildable unit so implementation can focus on proving the core implementation.'
    indent: 3

  - type: Heading
    level: H2
    title: Derive Product Requirements Document

  - type: Markdown
    contents: |
      1. Create a repository-scoped `derive-product-requirements-document` skill.

         This skill turns an agreed scope into a Product Requirements Document that is detailed enough to derive vertical slices.

  - type: Command
    commands: |
      cp -R '.fixtures/skills/derive-product-requirements-document' '.codex/skills/'
    indent: 3

  - type: Markdown
    contents: |
      (*Optional*) Show the generated skill metadata.
    indent: 3

  - type: Command
    commands: |
      tree --sort=name '.codex/skills/derive-product-requirements-document'
    output:
      caption: |
        The generated skill
    indent: 3

  - type: Markdown
    contents: |
      2. Commit the skill.

          In an interactive run, you can ask the model to analyse the modified files,
          create a commit message, and commit them using the following prompt.

          ```text
          commit changes
          ```

          The runbook uses manual Git commands so this step remains reproducible in
          environments where Codex cannot write to Git metadata.

  - type: Command
    commands: |
      git add '.codex/skills/derive-product-requirements-document'
      git commit \
        --message 'Add product requirements document skill' \
        --message 'Extend the reusable product workflow with a step that turns agreed scope into explicit product requirements before deriving vertical slices.'
    indent: 3

  - type: Markdown
    contents: |
      3. Apply the `derive-product-requirements-document` skill to obtain the product
         requirements document.

  - type: Command
    commands: |
      codex exec --full-auto <<'EOF'
      Use $derive-product-requirements-document to convert @docs/scopes/mvp-scope.md into a Product Requirements Document.
      EOF
    output:
      caption: |
        The model’s output
      rewrite:
        - type: limit_lines
          last: 20
    timeout: 5 minutes
    indent: 3

  - type: Markdown
    contents: |
      4. Ask the model to apply the documentation index rules from `AGENTS.md`.

  - type: Command
    commands: |
      codex exec --full-auto <<'EOF'
      Create any missing `README.md` files required by the documentation.
      EOF
    output:
      caption: |
        The model’s output
      rewrite:
        - type: limit_lines
          last: 20
    timeout: 1 minute
    indent: 3

  - type: Markdown
    contents: |
      (*Optional*) List the files under the `docs` directory
    indent: 3

  - type: Command
    commands: |
      tree --sort=name 'docs'
    output:
      caption: |
        The documentation files
    indent: 3

  - type: Markdown
    contents: |
      5. Commit changes

          In an interactive run, you can ask the model to analyse the modified files,
