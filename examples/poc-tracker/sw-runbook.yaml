entries:
  - type: Heading
    level: H1
    title: PoC Tracker

  - type: Heading
    level: H2
    title: Prerequisites

  - type: Prerequisite
    checks:
      - kind: command
        name: Git
        contents: |
          - [Git](https://git-scm.com/downloads)
        commands: git --version
        help: Install Git and make sure `git` is available on your PATH.
      - kind: command
        name: Codex CLI
        contents: |
          - [Codex CLI](https://developers.openai.com/codex/cli)
        commands: codex --version
        help: Install Codex CLI and make sure `codex` is available on your PATH.
      - kind: command
        name: Tree
        contents: |
          - [Tree](https://oldmanprogrammer.net/source.php?dir=projects/tree)
        commands: tree --version
        help: Install Tree and make sure `tree` is available on your PATH.

  - type: Heading
    level: H2
    title: Create Project

  - type: Markdown
    contents: |
      1. Create project and initialise Git.

  - type: Command
    commands: |
      git init

      cat <<'EOF' > '.gitignore'
      # Ignore the IDE and Development related files
      .idea/
      .oca/
      target/

      # Ignore the OS related files
      **/.DS_Store

      # Ignore the sw-runbook.yaml and README.md files as these are not part of this demo
      /sw-runbook.yaml
      /README.md
      EOF

      cat <<'EOF' > '.gitattributes'
      /mvnw text eol=lf
      *.cmd text eol=crlf
      EOF

      git add '.gitignore' '.gitattributes'
      git commit --message 'Add repository baseline files'
    indent: 3

  - type: Markdown
    contents: |
      2. Create the `AGENTS.md` file and define how to commit changes and how the
         directory will be initially organised.

  - type: Command
    commands: |
      cat <<'EOF' > 'AGENTS.md'
      # Repository Instructions

      ## Commit Messages

      Keep commits coherent. Each commit should contain one logical change, and unrelated repository workflow changes should be committed separately.

      When proposing commit messages, use:

      1. A short imperative subject line that starts with a verb.
      2. A body paragraph that explains why the change exists.

      Focus the body on motivation, context, or intent that cannot be determined from the diff. Avoid restating files changed or implementation details that are already visible in the commit.

      ## Ubiquitous Language

      Product, scope, requirements, and slice documents should use the project's ubiquitous language consistently.

      When introducing, changing, or discovering ambiguity in a domain-significant term, update `docs/domain/ubiquitous-language.md` or record the ambiguity as an open question in the relevant product artefact.

      Do not turn the ubiquitous language into a dump of every noun in the project. Capture terms that affect product behaviour, user experience, domain rules, data meaning, acceptance criteria, or implementation naming.

      ## Documentation Indexes

      Each documentation directory should contain a `README.md`.

      A directory `README.md` should explain the purpose of that directory and link to relevant child documentation:

      - The top-level `docs/README.md` links to subdirectory `README.md` files.
      - A subdirectory `README.md` describes that subdirectory and links to Markdown files in that subdirectory.
      - Keep indexes current when adding, moving, or deleting documentation files.
      EOF
    indent: 3

  - type: Markdown
    contents: |
      3. Commit changes

         In an interactive run, you can ask the model to analyse the modified
         files, create a commit message, and commit them using the following
         prompt.

         ```text
         commit changes
         ```

         The runbook uses manual Git commands so this step remains reproducible
         in environments where Codex cannot write to Git metadata.
  - type: Command
    commands: |
      git add 'AGENTS.md'
      git commit \
        --message 'Add repository agent instructions' \
        --message 'Capture repository-level expectations for coherent commits, shared domain language, and practical documentation indexes.' \
        --message 'Keep product, scope, requirements, and slice artefacts easier to review as the project grows.'
    indent: 3

  - type: Heading
    level: H2
    title: Create Product Description

  - type: Markdown
    contents: |
      1. Create the product description (`docs/product/description.md`).

  - type: Command
    commands: |
      mkdir -p 'docs/product'

      cat <<'EOF' > 'docs/product/description.md'
      # Product Description

      Managing Proof of Concepts (PoCs) across an organisation is often fragmented and opaque. Information is scattered across emails, chat threads, and informal updates, making it difficult for managers to understand the current status, ownership, and progress of each initiative. This lack of visibility leads to missed risks, delayed interventions, and lost learning opportunities.

      The PoC Tracker is a web-based application designed to provide a centralised, structured view of all ongoing and completed PoCs within an organisation. Its primary goal is to give managers clear, real-time insight into what is being worked on, who is responsible, and how each PoC is progressing.

      At its core, the system organises PoCs into a defined lifecycle with clearly distinguishable states:

      | State              | Description                                                                       |
      | ------------------ | --------------------------------------------------------------------------------- |
      | **Proposal**       | The PoC has been pitched and is awaiting customer feedback                        |
      | **Planning**       | The PoC has been approved and scope and success criteria are being defined        |
      | **Implementation** | The PoC is actively being implemented and technical work is in progress           |
      | **Blocked**        | Progress on the PoC is currently halted due to an issue requiring attention       |
      | **Evaluation**     | Implementation is complete and the PoC is under customer evaluation               |
      | **Accepted**       | The PoC has been evaluated and confirmed as successful                            |
      | **Rejected**       | The PoC has been evaluated and did not meet expectations, triggering a postmortem |

      This structured lifecycle enables consistent tracking and makes it easy to identify bottlenecks, stalled efforts, and successful outcomes across the portfolio.

      Each PoC record captures essential ownership and context, including the responsible internal owner, the customer involved, and key metadata needed for accountability and reporting.

      A central feature of the application is the **journal system**, which provides a chronological narrative of each PoC. Every update—whether it’s a progress note, a decision, or a state transition—is recorded as a journal entry. This creates a complete, transparent history that can be read end-to-end, allowing stakeholders to quickly understand what happened, why decisions were made, and how outcomes were reached.

      By combining structured state tracking with rich, time-ordered activity logs, the PoC Tracker transforms scattered updates into a coherent, auditable story. Managers can quickly assess risk (e.g., blocked PoCs), monitor progress across teams, and ensure that both successes and failures contribute to organisational learning.

      Ultimately, the PoC Tracker aims to replace fragmented communication with clarity, improve accountability, and turn every PoC into a source of actionable insight.
      EOF
    indent: 3

  - type: Markdown
    contents: |
      2. Ask the model to apply the documentation index rules from `AGENTS.md`.

  - type: Command
    commands: |
      codex exec --full-auto <<'EOF'
      Create any missing `README.md` files required by the documentation.
      EOF
    output:
      caption: |
        The model’s output
      rewrite:
        - type: limit_lines
          last: 20
    timeout: 1 minute
    indent: 3

  - type: Markdown
    contents: |
      (*Optional*) List the files under the `docs` directory
    indent: 3

  - type: Command
    commands: |
      tree --sort=name 'docs'
    output:
      caption: |
        The documentation files
    indent: 3

  - type: Markdown
    contents: |
      3. Commit changes

          In an interactive run, you can ask the model to analyse the modified files,
          create a commit message, and commit them using the following prompt.

          ```text
          commit changes
          ```

          The runbook uses manual Git commands so this step remains reproducible in
          environments where Codex cannot write to Git metadata.

  - type: Command
    commands: |
      git add 'docs/'
      git commit \
        --message 'Add product description' \
        --message 'Capture the initial product direction before narrowing it into a first minimum viable product (MVP) scope document.'
    indent: 3

  - type: Heading
    level: H2
    title: Create Minimum Viable Product (MVP) Scope

  - type: Markdown
    contents: |
      1. Ask the model to create a repository-scoped `create-scope` skill.

         The skill will help the model turn the product description into a clear
         scope before implementation starts.

  - type: Command
    commands: |
      mkdir -p '.codex/skills/create-scope/agents'

      # Create the skill file
      cat <<'EOF' > '.codex/skills/create-scope/SKILL.md'
      ---
      name: create-scope
      description: Use when a user proposes a product idea, project, feature, architecture, implementation plan, or ambiguous change and Codex should clarify the idea and create a clear scope before acting. The skill challenges vague assumptions, inspects available local context, asks one focussed question at a time when answers cannot be discovered, and continues until the problem, first user, smallest useful behaviour, trade-offs, risks, constraints, decisions, and next actions are clear enough to proceed.
      ---

      # Create Scope

      ## Overview

      Create enough shared understanding to define a scope and act deliberately. Prefer discovering answers from the repository or provided materials before asking the user, then challenge ambiguity with direct, focussed questions.

      ## Workflow

      1. Restate the proposed work in concrete terms.
      2. Run the idea-readiness gate before writing scope:
        - problem being solved
        - first user or beneficiary
        - desired outcome
        - smallest useful behaviour that would prove value
        - major assumptions or unresolved decisions
      3. Check whether the clarified intent changes the product description. If it does, update the relevant product description artefact before or alongside the scope.
      4. Identify assumptions, missing decisions, and terms that could mean more than one thing.
      5. Capture trade-offs as ranked decision priorities that can guide later choices, for example learning clarity > small scope > polish > extensibility.
      6. Capture risks that could break the user experience, invalidate the scope, or cause scope expansion.
      7. Inspect local context when it can answer a question: files, docs, existing code, git state, configs, scripts, and tests.
      8. Ask exactly one question at a time when the answer cannot be determined safely.
      9. Push back when a request is too broad, contradictory, premature, not ready for scoping, or not yet tied to a user outcome.
      10. Continue until the next action is clear enough to execute or the user explicitly stops.

      ## Domain Language

      When a domain-significant term affects product behaviour, user experience, domain rules, data meaning, acceptance criteria, or implementation naming, keep the ubiquitous language current.

      - If the term is clear and important, add or update it in `docs/domain/ubiquitous-language.md`.
      - If the term is ambiguous, record the ambiguity as an open question in the relevant product artefact.
      - If creating a new documentation directory or Markdown file, keep the corresponding `README.md` index current.

      ## Question Style

      Ask questions that change the plan. Avoid asking for preferences that can be inferred from the codebase or chosen conservatively.

      Good questions:

      - "Who is the first real user of this workflow?"
      - "What is the smallest behaviour that would prove this feature is useful?"
      - "Should this be optimised for local learning, production deployment, or both?"
      - "What failure case must the first version handle?"
      - "Which priority wins when learning clarity, delivery speed, polish, and extensibility conflict?"

      Poor questions:

      - "What should I do next?"
      - "Do you want this to be good?"
      - "Which stack should I use?" when the repository already constrains the answer.

      ## Output

      When enough clarity exists, summarise:

      - the agreed goal
      - the current constraints
      - the smallest useful behaviour
      - the trade-offs and risks captured
      - the decisions made
      - any domain language updates or unresolved term ambiguities
      - the next concrete action

      ## Scope Documents

      For product, project, or feature scoping work, create or update the scope artefact once enough clarity exists unless the user explicitly asks for discussion only. Write scope documents under `docs/scopes/`.

      Use a focussed, kebab-case filename:

      ```text
      docs/scopes/mvp-scope.md
      docs/scopes/v2-feature-scope.md
      ```

      Include a `Source` section that links to the product description, prompt, issue, or other artefact used as input. Adjust the relative link to match the actual output path.

      Use this structure:

      ```markdown
      # Scope

      ## Source

      Derived from:

      - [product description](../product/description.md)

      ## Goal

      ## Target User

      ## Smallest Useful Behaviour

      ## In Scope

      ## Out Of Scope

      ## Trade-Offs

      ## Risks

      ## Decisions

      ## Open Questions

      ## Next Step
      ```

      If implementation should start immediately, state the first task and proceed.
      EOF

      # Create the metadata used by Codex-style clients to present the skill in the UI
      cat <<'EOF' > '.codex/skills/create-scope/agents/openai.yaml'
      interface:
        display_name: "Create Scope"
        short_description: "Clarify scope before building"
        default_prompt: "Use $create-scope to clarify the idea, smallest useful behaviour, trade-offs, risks, scope, and decisions before implementation."
      EOF
    indent: 3

  - type: Markdown
    contents: |
      (*Optional*) Show the generated skill metadata.
    indent: 3

  - type: Command
    commands: |
      tree --sort=name '.codex/skills/create-scope'
    output:
      caption: |
        The generated skill
    indent: 3

  - type: Markdown
    contents: |
      2. Commit the skill.

          In an interactive run, you can ask the model to analyse the modified files,
          create a commit message, and commit them using the following prompt.

          ```text
          commit changes
          ```

          The runbook uses manual Git commands so this step remains reproducible in
          environments where Codex cannot write to Git metadata.

  - type: Command
    commands: |
      git add '.codex/skills/create-scope'
      git commit \
        --message 'Add create scope skill' \
        --message 'Teach Codex to clarify product ideas and produce focused scope documents before implementation starts.'
    indent: 3

  - type: Markdown
    contents: |
      3. Apply the `create-scope` skill to obtain the first scope document, usually
         referred to as the MVP Scope.

         ```text
         Use $create-scope to clarify @docs/product/description.md before we create requirements or scaffold the application.
         ```

         The runbook provides answers up front because it needs to run unattended. In
         an interactive session, you can use the prompt alone and answer the questions
         one by one.

  - type: Command
    commands: |
      codex exec --full-auto <<'EOF'
      Use $create-scope to clarify @docs/product/description.md before we create requirements or scaffold the application.

      In this case, don’t ask me questions and use the answers shown below instead. In case you still have further questions, use your best judgement and keep things simple.

      Q: Who is the first real user we should optimise the MVP for, and what decision do they need the tracker to help them make?
      A: The first two real users are the Value Engineering Manager, referred to as the manager, who is responsible for the engineers running the PoCs, and the engineers who run the PoCs.

      Q: What is the smallest recurring decision the manager must be able to make from the tracker — for example “which PoCs need intervention this week?”, “which engineers are overloaded?”, or “which customer PoCs are likely to succeed/fail?”
      A: The manager needs to view all PoCs, filter them by state or engineer, and order them by date. Filtering can be as simple as showing all PoCs in a given state, or all PoCs owned by a given engineer.

      Q: For the MVP, which single date should ordering use: PoC creation date, last updated date, or last journal entry date?
      A: Use the last updated date.

      Q: What is the minimum action an engineer must be able to perform to keep a PoC current — update only the lifecycle state, add a journal note, or both together in one update?
      A: An engineer needs to be able to do the following:
      - Change the state of the PoC. When the state is changed, the user must provide a description related to the state change.
      - Add journal entries as notes related to the PoC.
      Given that authentication and authorisation are not part of the MVP, users need a simple way to select who they are. The application will then use that selected user as the person carrying out each action.
      All entries need to be timestamped. The system timestamp is sufficient for the MVP.

      Q: Where does the selectable user list come from in the MVP — a fixed seeded list of engineers/managers, manually entered each time, or managed inside the app?
      A: For the MVP, we can assume a fixed list of engineers and managers. The list will be hardcoded, and user management will not be available.

      Q: Who can create a PoC in the MVP, and what minimum fields are required at creation?
      A: For the MVP, everyone can create a PoC. Authorisation will be added at a later stage.
      The PoC will have the following fields:
      - title: A short description of the PoC, such as ‘Evaluate Product X for Customer Y’
      - description: A longer description that captures additional information and constraints that do not fit in the title field. This field will also define what is in scope and out of scope for the PoC.
      - customer: The customer name for whom the PoC is targeted. For the MVP, this can be a free-form text field.
      - state: One of the states listed in the product description, with `Proposal` as the default option.
      - success criteria: The success criteria for the PoC. For the MVP, these can be entered as free-form text.
      - engineer: The engineer running the PoC, selected from the list of engineers.
      - contact: The main contact person on the customer side who is responsible for communication regarding the PoC.
      The contact should be a required field, as otherwise the PoC cannot be proposed. An engineer may have a call with a person who agrees to initiate the PoC. The engineer then creates a proposal and sends it to this contact.

      Q: For the MVP, should lifecycle state changes be unrestricted between any states, or should we enforce a defined transition flow, for example Proposal → Planning → Implementation → Evaluation → Accepted/Rejected, with Blocked reachable from active states?
      A: We do not need to apply any flow rules for the MVP. Simply log all changes in a journal-like fashion. When the state is changed, add a new entry to the log and show the new state as the current state.

      Q: For the MVP, is normal page refresh/current database state sufficient, or do managers need live updates without refreshing the page?
      A: We can keep it simple and use page refreshes for the MVP. Live updates can come at a later stage.

      Q: Should the MVP only track the PoC proposal, or must it also generate/send a proposal to the customer contact?
      A: The MVP should only track the PoC and should not generate/send a proposal to the customer. The MVP will only support PoC creation, retrieval and updates. Deletion will not be supported.

      Q: for the MVP, should edits to PoC fields be journaled automatically, or should the journal only contain explicit notes and state changes?
      A: Ideally, we use a journal approach where every change is logged as an entry without overcomplicating the application. Some changes will update the PoC state and last updated date. Changes to the PoC details need to be captured as update entries, not as simple database updates. There needs to be a trail of what changed, who changed it, and when it changed for accountability.

      Q: For PoC detail edits, is it enough to journal a user-provided update description plus the edited fields, or do you require exact before/after values for each changed field in the MVP?
      A: We do not need to implement an event streaming system for the MVP. Add a log entry for every change. For example, when the PoC is created, create the PoC with the provided details and a log entry linked to it. When the PoC is updated, update the PoC and add a new log entry with the changes. This gives us a trail of all changes made to a given PoC. The log entries do not need to be sophisticated and can be text based. If the description field is updated, the log entry can simply state: “Description updated to: …”. The log entry should have at least the following fields:
      - user: the user making the change, who can be either a manager or an engineer
      - date: the date and time when this log entry was added
      - log: the contents of this log entry

      Q: What persistence level do you want for the MVP — in-memory/demo data, local file/SQLite, or a real application database? This affects scaffolding much more than UI details.
      A: For the MVP, we can start with a simple file-based database such as H2. This supports persistence to a file, which will survive application restarts. Later on, we can move to a production database, but that will not happen as part of the MVP.

      Q: Should the MVP be scoped as a single server-rendered web application with forms/pages, or do you want a separate REST API plus frontend from the start?
      A: Yes. We can use Java 25, Spring Boot Web, and Thymeleaf for server-side HTML rendering. For the MVP, we can assume that each action will trigger a full page reload.

      Q: Do you want me to create the scope artifact now at docs/scopes/mvp-scope.md and update the docs index files accordingly?
      A: Yes.
      EOF
    output:
      caption: |
        The model’s output
      rewrite:
        - type: limit_lines
          last: 20
    timeout: 5 minutes
    indent: 3

  - type: Markdown
    contents: |
      4. Ask the model to apply the documentation index rules from `AGENTS.md`.

  - type: Command
    commands: |
      codex exec --full-auto <<'EOF'
      Create any missing `README.md` files required by the documentation.
      EOF
    output:
      caption: |
        The model’s output
      rewrite:
        - type: limit_lines
          last: 20
    timeout: 2 minutes
    indent: 3

  - type: Markdown
    contents: |
      (*Optional*) List the files under the `docs` directory
    indent: 3

  - type: Command
    commands: |
      tree --sort=name 'docs'
    output:
      caption: |
        The documentation files
    indent: 3

  - type: Markdown
    contents: |
      5. Commit changes

          In an interactive run, you can ask the model to analyse the modified files,
          create a commit message, and commit them using the following prompt.

          ```text
          commit changes
          ```

          The runbook uses manual Git commands so this step remains reproducible in
          environments where Codex cannot write to Git metadata.

  - type: Command
    commands: |
      git add 'docs/'
      git commit \
        --message 'Add MVP scope' \
        --message 'Capture the first buildable unit so implementation can focus on proving the core implementation.'
    indent: 3

  - type: Heading
    level: H2
    title: Derive Product Requirements Document

  - type: Markdown
    contents: |
      1. Create a repository-scoped `derive-product-requirements-document` skill.

         This skill turns an agreed scope into a Product Requirements Document that is detailed enough to derive vertical slices.

  - type: Command
    commands: |
      mkdir -p '.codex/skills/derive-product-requirements-document/agents'

      # Create the skill file
      cat <<'EOF' > '.codex/skills/derive-product-requirements-document/SKILL.md'
      ---
      name: derive-product-requirements-document
      description: Use when Codex needs to convert an agreed product scope, MVP scope, or clarified feature scope into a Product Requirements Document before deriving vertical slices or implementation plans. The skill expands scope and lean-inception-style decisions into product-facing requirements, goals, non-goals, user journeys, acceptance criteria, success measures, constraints, risks, and open questions without inventing unresolved product decisions.
      ---

      # Derive Product Requirements Document

      ## Overview

      Turn an agreed scope into a practical Product Requirements Document that is detailed enough to guide slicing and implementation.

      Prefer clarity over ceremony. The PRD should preserve product intent, carry forward lean-inception-style decisions, expose unresolved decisions, and avoid technical design unless a technical constraint changes product requirements.

      ## Inputs

      Start from the most specific scope artefact available, usually one of:

      - `docs/scopes/*.md`
      - a clarified feature scope
      - a user-provided scope document

      Inspect the product description and related docs when they clarify intent, but do not expand the PRD beyond the agreed scope without calling it out.

      ## Workflow

      1. Restate the product outcome, first user, and smallest useful behaviour from the scope.
      2. Carry forward the Not List as PRD non-goals; do not let excluded future ideas become current requirements.
      3. Translate trade-off decisions into constraints or decision notes that can guide later slicing.
      4. Extract the core user journey and required user-visible behaviours.
      5. Convert requirements into observable acceptance criteria.
      6. Capture success measures that reflect user value, not vanity metrics.
      7. Record constraints, risks, and open questions, including assumptions raised during scoping.
      8. Preserve domain-significant terms from the scope and check whether `docs/domain/ubiquitous-language.md` needs an update or an ambiguity note.
      9. Ask the user when the PRD would otherwise require inventing a product decision.
      10. Include a `Source` section that links to the scope document used as input.
      11. Write or update the PRD as Markdown under `docs/requirements/`, and keep the directory `README.md` current when files are added, moved, or deleted.

      ## Lean Inception Inputs

      When the scope contains lean-inception-style outputs, map them into the PRD instead of creating separate ceremony sections:

      - Vision, elevator pitch, or product intent -> `Summary`, `Problem`, and `Goals`.
      - First user, persona, or beneficiary -> `Target User`.
      - Smallest useful behaviour or core learning loop -> `User Journeys`, `Functional Requirements`, and `Acceptance Criteria`.
      - Not List or out-of-scope decisions -> `Non-Goals`.
      - Trade-off sliders or decision priorities -> `Constraints` or explicit product decisions.
      - Heaven/Hell, risks, or failure scenarios -> `Risks`, `Success Measures`, and relevant acceptance criteria.
      - Open questions and ambiguous terms -> `Open Questions` and, when domain-significant, ubiquitous language updates.

      ## File Naming

      Use a focussed, kebab-case filename:

      ```text
      docs/requirements/product-requirements-document.md
      ```

      For a scoped feature PRD, use the feature name:

      ```text
      docs/requirements/article-practice-prd.md
      ```

      Avoid scattering one PRD across multiple files unless the product is large enough to justify it.

      ## PRD Template

      Use this structure:

      ```markdown
      # Product Requirements Document

      ## Source

      Derived from:

      - [scope document](../scopes/mvp-scope.md)

      ## Summary

      ## Target User

      ## Problem

      ## Goals

      ## Non-Goals

      ## User Journeys

      ## Functional Requirements

      ## Acceptance Criteria

      ## Success Measures

      ## Constraints

      ## Risks

      ## Open Questions
      ```

      Keep sections concise. If a section does not apply, say why or omit it when that improves clarity.

      Adjust the source link to match the actual input path. For example, if the PRD is created at `docs/requirements/product-requirements-document.md` from `docs/scopes/mvp-scope.md`, link to `../scopes/mvp-scope.md`.

      ## Quality Bar

      A good PRD:

      - makes product behaviour explicit enough to derive vertical slices
      - separates goals from non-goals
      - carries forward the scope's smallest useful behaviour, Not List, trade-offs, risks, and open questions
      - describes user-visible requirements rather than implementation tasks
      - includes acceptance criteria that can be verified
      - preserves open questions instead of pretending they are answered

      A poor PRD:

      - restates the scope without adding decision clarity
      - hides unresolved assumptions
      - drops scope decisions that should constrain implementation
      - turns into a technical architecture document
      - includes future ideas as current requirements
      - uses success metrics that do not reflect user learning or user value

      ## Output

      After creating or revising the PRD, summarise:

      - the PRD file created or changed
      - the major product decisions captured
      - the lean-inception-style inputs carried forward or intentionally omitted
      - the open questions that remain
      - whether the PRD is ready for `derive-vertical-slices`
      EOF

      # Create the metadata used by Codex-style clients how to present the skill in the UI
      cat <<'EOF' > '.codex/skills/derive-product-requirements-document/agents/openai.yaml'
      interface:
        display_name: "Derive Product Requirements Document"
        short_description: "Turn agreed scope into a practical PRD"
        default_prompt: "Use $derive-product-requirements-document to convert the agreed scope and lean-inception-style decisions into a product requirements document."
      EOF
    indent: 3

  - type: Markdown
    contents: |
      (*Optional*) Show the generated skill metadata.
    indent: 3

  - type: Command
    commands: |
      tree --sort=name '.codex/skills/derive-product-requirements-document'
    output:
      caption: |
        The generated skill
    indent: 3

  - type: Markdown
    contents: |
      2. Commit the skill.

          In an interactive run, you can ask the model to analyse the modified files,
          create a commit message, and commit them using the following prompt.

          ```text
          commit changes
          ```

          The runbook uses manual Git commands so this step remains reproducible in
          environments where Codex cannot write to Git metadata.

  - type: Command
    commands: |
      git add '.codex/skills/derive-product-requirements-document'
      git commit \
        --message 'Add product requirements document skill' \
        --message 'Extend the reusable product workflow with a step that turns agreed scope into explicit product requirements before deriving vertical slices.'
    indent: 3

  - type: Markdown
    contents: |
      3. Apply the `derive-product-requirements-document` skill to obtain the product
         requirements document.

  - type: Command
    commands: |
