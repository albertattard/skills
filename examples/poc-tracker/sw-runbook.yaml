  - type: Command
    commands: |
      git add 'docs/'
      git commit \
        --message 'Add product requirements' \
        --message 'Capture the MVP requirements derived from the agreed scope so the next workflow step can split the requirements into vertical slices.'
    indent: 3

  - type: Heading
    level: H2
    title: Derive Vertical Slices

  - type: Markdown
    contents: |
      1. Create a repository-scoped `derive-vertical-slices` skill.

         This skill helps the model turn a Product Requirements Document (PRD) into
         small, ordered vertical slice documents under `docs/slices/`. Each slice must
         be independently understandable, linked back to the source PRD, focused on a
         user-visible outcome, and avoid horizontal technical task breakdowns.

  - type: Command
    commands: |
      cp -R '.fixtures/skills/derive-vertical-slices' '.codex/skills/'
    indent: 3

  - type: Markdown
    contents: |
      (*Optional*) Show the generated skill metadata.
    indent: 3

  - type: Command
    commands: |
      tree --sort=name '.codex/skills/derive-vertical-slices'
    output:
      caption: |
        The generated skill
    indent: 3

  - type: Markdown
    contents: |
      2. Commit the skill.

          In an interactive run, you can ask the model to analyse the modified files,
          create a commit message, and commit them using the following prompt.

          ```text
          commit changes
